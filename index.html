<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aerostar Contract — Packaging Configurator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Montserrat:wght@400;700;900&family=Playfair+Display:wght@400;700&family=Oswald:wght@400;700&family=Bebas+Neue&family=Raleway:wght@300;700&family=Abril+Fatface&display=swap" rel="stylesheet">
<style>
:root{--blue:#1557b0;--blue2:#1e6fd9;--blue-dark:#0a3578;--blue-nav:#0d3a7a;--blue-bg:#f0f5fc;--border:#dde5f0;--bg:#f4f6fb;--text:#0f172a;--sub:#334155;--muted:#64748b;--white:#fff;}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:"Lato",sans-serif;background:var(--bg);color:var(--text);font-size:13px;overflow-x:hidden}
.top-bar{background:var(--white);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 16px;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;flex-direction:column;user-select:none;line-height:1;flex-shrink:0}
.logo-ltr{display:flex;align-items:center}
.logo-lt{font-size:24px;font-weight:300;color:#5c6b7a;letter-spacing:-.5px}
.logo-contract{font-family:Georgia,serif;font-style:italic;color:var(--blue);font-size:12px;padding-left:56px;margin-top:-1px}
.hdr-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.hdr-tag{font-size:9.5px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.hdr-sep{width:1px;height:14px;background:var(--border);flex-shrink:0}
.hdr-btn{font-size:10px;font-weight:700;color:var(--blue);text-decoration:none;border:1.5px solid var(--blue);border-radius:20px;padding:3px 12px;white-space:nowrap;transition:all .15s}
.hdr-btn:hover{background:var(--blue);color:#fff}
.nav-bar{background:var(--blue-nav);height:34px;display:flex;align-items:center;padding:0 16px;flex-shrink:0;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:52px;z-index:99}.nav-bar::-webkit-scrollbar{display:none}
.nav-bar a{color:rgba(255,255,255,.65);text-decoration:none;font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:0 10px;height:34px;display:flex;align-items:center;transition:color .15s;white-space:nowrap;flex-shrink:0}
.nav-bar a:hover{color:#fff}.nav-bar .spacer{flex:1}
.nb-div{width:1px;height:14px;background:rgba(255,255,255,.15);margin:0 2px;flex-shrink:0}
.layout{display:grid;grid-template-columns:minmax(0,1fr) 520px;height:calc(100vh - 86px);overflow:hidden}
.left{overflow-y:auto;overflow-x:hidden;padding:18px 20px 28px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;min-width:0}
.right{position:relative;background:#1a1c22;border-left:1px solid var(--border);overflow:hidden;flex-shrink:0}
#c3{width:100%;height:100%;display:block;cursor:grab;touch-action:none;user-select:none}
#c3:active{cursor:grabbing}
.can-badge{position:absolute;top:14px;left:14px;background:rgba(20,22,28,.82);backdrop-filter:blur(10px);border-radius:6px;padding:7px 12px;pointer-events:none;border:1px solid rgba(255,255,255,.12);box-shadow:0 2px 12px rgba(0,0,0,.4);max-width:200px}
.badge-prod{font-size:10.5px;font-weight:700;color:#a8c4f0;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge-spec{font-size:8.5px;color:rgba(255,255,255,.5);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drag-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#fff;opacity:.35;pointer-events:none;display:flex;align-items:center;gap:6px;white-space:nowrap}
.step-progress{display:flex;align-items:center;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden}
.sp-item{display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0;min-width:0}
.sp-num{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0;transition:all .2s}
.sp-item.active .sp-num{background:var(--blue);border-color:var(--blue);color:#fff}
.sp-item.done .sp-num{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.sp-meta{display:flex;flex-direction:column;gap:1px;min-width:0}
.sp-step{font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
.sp-label{font-size:10.5px;font-weight:600;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp-item.active .sp-label{color:var(--blue-dark)}.sp-item.active .sp-step{color:var(--blue)}
.sp-item.done .sp-label,.sp-item.done .sp-step{color:var(--blue);opacity:.8}
.sp-connector{flex:1;height:1px;background:var(--border);margin:0 8px;min-width:8px}
.sp-connector.past{background:var(--blue);opacity:.3}
.box{background:var(--white);border-radius:8px;border:1px solid var(--border);padding:20px 20px;box-shadow:0 1px 3px rgba(0,0,0,.04);min-width:0;overflow:hidden}
.sec-title{font-size:18px;font-weight:300;color:var(--blue-dark);margin-bottom:16px;letter-spacing:-.2px}
.field-label{font-size:8.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin-bottom:7px;display:block}
.cat-tabs{display:flex;gap:6px;margin-bottom:16px}
.ct{flex:1;padding:9px 6px;border:1.5px solid var(--border);border-radius:7px;background:var(--white);color:var(--muted);font-size:10.5px;font-weight:700;cursor:pointer;text-align:center;transition:all .12s;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ct:hover{border-color:var(--blue2)}.ct.on{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.size-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.sz{padding:4px 11px;border-radius:4px;border:1px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;background:var(--white);color:var(--muted);transition:all .14s;letter-spacing:.2px;white-space:nowrap}
.sz:hover{border-color:var(--blue)}.sz.on{background:var(--blue);border-color:var(--blue);color:#fff}
.prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:16px}
.pcard{border:1px solid var(--border);border-radius:7px;padding:11px 10px;cursor:pointer;transition:all .14s;background:var(--white);display:flex;align-items:center;gap:10px;min-width:0;overflow:hidden}
.pcard:hover{border-color:var(--blue2);box-shadow:0 2px 8px rgba(21,87,176,.08)}.pcard.on{border-color:var(--blue);background:var(--blue-bg)}
.pcard-icon{width:24px;flex-shrink:0;display:flex;justify-content:center;color:var(--muted)}.pcard.on .pcard-icon{color:var(--blue)}
.pcard-text{min-width:0;overflow:hidden}
.pcard-name{font-size:11.5px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-sub{font-size:9.5px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard.on .pcard-name{color:var(--blue-dark)}.pcard.on .pcard-sub{color:var(--blue)}
/* Cap style grid - NEW */
.cap-style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.cap-style-card{border:1.5px solid var(--border);border-radius:8px;padding:10px 8px 8px;cursor:pointer;background:var(--white);transition:all .14s;text-align:center;overflow:hidden}
.cap-style-card:hover{border-color:var(--blue2);box-shadow:0 2px 8px rgba(21,87,176,.08)}
.cap-style-card.on{border-color:var(--blue);background:var(--blue-bg)}
.cap-views-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:7px}
.cap-view-cell{display:flex;flex-direction:column;align-items:center;gap:2px}
.cap-view-lbl{font-size:6.5px;font-weight:700;color:var(--muted);letter-spacing:.4px;text-transform:uppercase}
.cap-style-card.on .cap-view-lbl{color:var(--blue);opacity:.8}
.cap-style-name{font-size:10.5px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cap-style-desc{font-size:9px;color:var(--muted);margin-top:1px;line-height:1.3}
.cap-style-card.on .cap-style-name{color:var(--blue)}
.ptabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.pfam-btn{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;border:1px solid var(--border);font-size:10px;font-weight:600;cursor:pointer;background:var(--white);color:var(--muted);transition:all .12s;white-space:nowrap}
.pfam-btn:hover{border-color:var(--blue2)}.pfam-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.pfam-dot{width:7px;height:7px;border-radius:50%;border:1px solid rgba(0,0,0,.12);flex-shrink:0}
.p-search-wrap{position:relative;margin-bottom:9px}
.p-search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted)}
.psearch{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:11.5px;outline:none;color:var(--text);background:var(--white);transition:border-color .14s}
.psearch:focus{border-color:var(--blue)}
.pgrid-color{display:flex;flex-wrap:wrap;gap:5px;max-height:140px;overflow-y:auto;margin-bottom:9px;padding:2px;scrollbar-width:thin}
.psw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;position:relative;transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease;flex-shrink:0;will-change:transform;transform:translateZ(0);backface-visibility:hidden}
.psw:hover{transform:translateZ(0) scale(1.08);z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.16)}.psw.on{border-color:#0a3578 !important;transform:translateZ(0) scale(1.04)}
.p-selected{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--blue-bg);border-radius:6px;border:1px solid rgba(21,87,176,.14);margin-bottom:9px;min-height:44px;min-width:0;overflow:hidden}
.p-sel-swatch{width:28px;height:28px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.1);box-shadow:0 1px 4px rgba(0,0,0,.15)}
.p-sel-code{font-size:9.5px;font-weight:700;color:var(--blue);letter-spacing:.4px}
.p-sel-name{font-size:11px;color:var(--text);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.custom-row{display:flex;align-items:center;gap:8px;padding-top:3px}
.custom-lbl{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.custom-row input[type=color]{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);padding:2px;cursor:pointer;background:none;flex-shrink:0}
.hex-input{flex:1;min-width:0;padding:6px 9px;border:1px solid var(--border);border-radius:5px;font-size:11px;font-family:"Lato",monospace;color:var(--text);outline:none}
.hex-input:focus{border-color:var(--blue)}
.match-toggle{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:7px;cursor:pointer;background:var(--white);margin-bottom:10px;transition:all .14s;min-width:0;overflow:hidden}
.match-toggle:hover{border-color:var(--blue)}.match-toggle.on{border-color:var(--blue);background:var(--blue-bg)}
.match-toggle svg{color:var(--muted);flex-shrink:0}.match-toggle.on svg{color:var(--blue)}
.match-text{font-size:11px;font-weight:600;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.match-toggle.on .match-text{color:var(--blue)}
.match-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .14s}
.match-toggle.on .match-check{background:var(--blue);border-color:var(--blue)}
/* Finish grid - 4 cols for new finishes */
.fin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.fg{border:2px solid var(--border);border-radius:9px;padding:10px 6px 8px;text-align:center;cursor:pointer;background:var(--white);transition:all .18s;overflow:hidden;position:relative}
.fg:hover{border-color:var(--blue2);transform:translateY(-1px);box-shadow:0 3px 10px rgba(21,87,176,.12)}.fg.on{border-color:var(--blue);background:var(--blue-bg);box-shadow:0 0 0 3px rgba(21,87,176,.12)}
.fg-ball{width:36px;height:36px;border-radius:50%;margin:0 auto 6px;border:1px solid rgba(0,0,0,.12);box-shadow:0 2px 8px rgba(0,0,0,.18)}
.fg-name{font-size:9.5px;font-weight:700;color:var(--muted);letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.fg.on .fg-name{color:var(--blue)}.fg-check{display:none;position:absolute;top:5px;right:5px;width:14px;height:14px;border-radius:50%;background:var(--blue);align-items:center;justify-content:center}.fg.on .fg-check{display:flex}
.bare-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--blue-bg);border:1px solid rgba(21,87,176,.12);border-radius:7px;margin-bottom:14px;gap:10px}
.bare-lbl{font-size:11px;font-weight:600;color:var(--sub)}.bare-sub{font-size:9px;color:var(--muted);margin-top:1px}
.toggle{position:relative;display:inline-block;width:38px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tgl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#cbd5e1;border-radius:20px;transition:.25s}
.tgl:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input:checked+.tgl{background:var(--blue)}
input:checked+.tgl:before{transform:translateX(18px)}
.upload-zone{border:1.5px dashed var(--border);border-radius:7px;padding:18px 14px;text-align:center;cursor:pointer;background:var(--white);position:relative;transition:all .14s;overflow:hidden}
.upload-zone:hover,.upload-zone.has{border-color:var(--blue);background:var(--blue-bg)}
.up-icon-wrap{width:36px;height:36px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 9px;color:var(--blue);border:1px solid rgba(21,87,176,.15)}
.up-txt{font-size:12px;font-weight:600;color:var(--sub)}.up-hint{font-size:9.5px;color:var(--muted);margin-top:2px}
.up-preview{width:100%;max-height:56px;object-fit:contain;border-radius:5px;margin-top:10px;display:none}.up-preview.on{display:block}
.up-clear{position:absolute;top:8px;right:10px;background:#ef4444;border:none;border-radius:4px;color:#fff;padding:2px 8px;font-size:9px;cursor:pointer;display:none;font-family:inherit;font-weight:700}
.upload-zone.has .up-clear{display:block}
.lsliders{border:1px solid var(--border);border-radius:7px;padding:12px;margin-top:8px;display:none;background:var(--white)}.lsliders.on{display:block}
.sl-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}.sl-row:last-child{margin-bottom:0}
.sl-row label{width:52px;font-size:8.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;flex-shrink:0}
.sl-row input[type=range]{flex:1;height:3px;border-radius:3px;background:var(--border);-webkit-appearance:none;cursor:pointer;min-width:0}
.sl-row input[type=range]::-webkit-slider-thumb{width:13px;height:13px;background:var(--blue);border-radius:50%;-webkit-appearance:none;border:2px solid #fff;box-shadow:0 0 0 1px var(--blue)}
.sl-val{width:30px;font-size:9.5px;color:var(--blue);font-weight:700;text-align:right;flex-shrink:0}
.spec-box{background:var(--blue-bg);border:1px solid rgba(21,87,176,.14);border-radius:7px;padding:11px 14px;margin-bottom:12px}
.spec-head{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--blue);margin-bottom:8px}
.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 12px}
.spec-key{font-size:9px;color:var(--muted)}.spec-val{font-size:11px;font-weight:700;color:var(--text)}
.summary{background:var(--blue-bg);border-radius:7px;padding:12px 14px;margin-bottom:18px;border:1px solid rgba(21,87,176,.12)}
.sum-head{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--blue);margin-bottom:8px}
.sum-row{display:flex;justify-content:space-between;align-items:baseline;font-size:11.5px;padding:3.5px 0;border-bottom:1px solid rgba(21,87,176,.07);gap:8px}.sum-row:last-child{border-bottom:none}
.sk{color:var(--muted);flex-shrink:0}.sv{font-weight:700;color:var(--blue-dark);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fc{display:flex;flex-direction:column;gap:4px;min-width:0}.fc.full{grid-column:1/-1}
.flb{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)}
.fi{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:12.5px;color:var(--text);outline:none;transition:border-color .14s;background:var(--white);width:100%}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,87,176,.08)}
.navrow{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);gap:10px}
.btn-back{padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:var(--white);color:var(--muted);cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;transition:all .14s;white-space:nowrap;flex-shrink:0}
.btn-back:hover{border-color:var(--blue);color:var(--blue)}
.btn-next{padding:8px 20px;border:none;border-radius:6px;background:var(--blue);color:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:5px;transition:background .14s;white-space:nowrap;flex-shrink:0}
.btn-next:hover{background:var(--blue-dark)}
.success-wrap{text-align:center;padding:32px 16px}
.ok-mark{width:56px;height:56px;border-radius:50%;background:var(--blue-bg);border:2px solid var(--blue);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--blue)}
/* Template grid with deselect */
.tpl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.tpl-card{border:2px solid var(--border);border-radius:7px;overflow:hidden;cursor:pointer;position:relative;transition:all .14s;background:var(--white)}
.tpl-card:hover{border-color:var(--blue2);box-shadow:0 2px 8px rgba(21,87,176,.1)}
.tpl-card.on{border-color:var(--blue)}
.tpl-canvas{width:100%;display:block;aspect-ratio:1.9/1}
.tpl-label{font-size:9px;font-weight:700;color:var(--muted);text-align:center;padding:4px 4px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tpl-card.on .tpl-label{color:var(--blue)}
.tpl-check{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:var(--blue);display:none;align-items:center;justify-content:center}
.tpl-card.on .tpl-check{display:flex}
/* Deselect X button - shown on selected template */
.tpl-desel{position:absolute;top:3px;left:3px;background:rgba(239,68,68,.9);border:none;border-radius:3px;color:#fff;padding:1px 5px;font-size:8px;cursor:pointer;display:none;font-family:inherit;font-weight:700;line-height:1.5;z-index:2}
.tpl-card.on .tpl-desel{display:block}
.lang-toggle{display:flex;align-items:center;background:var(--blue-bg);border:1.5px solid var(--border);border-radius:20px;overflow:hidden;flex-shrink:0}
.lang-opt{padding:3px 11px;font-size:9.5px;font-weight:700;letter-spacing:.6px;cursor:pointer;transition:all .15s;color:var(--muted);white-space:nowrap;user-select:none}
.lang-opt.active{background:var(--blue);color:#fff;border-radius:18px}
.zoom-wrap{position:absolute;bottom:44px;right:12px;display:flex;flex-direction:column;gap:4px;z-index:10}

.action-card-title{font-size:12.5px;font-weight:700;color:var(--blue-dark)}
.action-card-sub{font-size:9.5px;color:var(--muted);line-height:1.4;max-width:120px}
.art-tabs{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:14px}
.art-tab{flex:1;padding:9px 8px;text-align:center;font-size:10.5px;font-weight:700;cursor:pointer;background:var(--white);color:var(--muted);transition:all .14s;display:flex;align-items:center;justify-content:center;gap:5px}
.art-tab+.art-tab{border-left:1px solid var(--border)}
.art-tab:hover{color:var(--blue)}.art-tab.on{background:var(--blue);color:#fff}
.studio-wrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--white)}
.studio-toolbar{display:flex;align-items:center;gap:5px;padding:8px 10px;background:var(--blue-bg);border-bottom:1px solid var(--border);flex-wrap:wrap}
.studio-tbtn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid var(--border);border-radius:5px;background:var(--white);color:var(--sub);font-size:10.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;line-height:1}

.studio-canvas-wrap canvas{display:block!important}
.studio-props{padding:8px 12px;background:#fafbff;border-top:1px solid var(--border);min-height:38px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}

.spr-select{padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit;color:var(--text);outline:none;background:var(--white);max-width:130px}
.spr-select:focus{border-color:var(--blue)}
.spr-num{width:48px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit;color:var(--text);outline:none;text-align:center}

.emoji-cat-btn:hover{border-color:var(--blue)}.emoji-cat-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.emoji-grid{display:flex;flex-wrap:wrap;gap:3px;max-height:108px;overflow-y:auto;scrollbar-width:thin}

function makeAngledCapGeom(outerR,height,rSegs,hSegs){
  rSegs=rSegs||96;hSegs=hSegs||28;
  const g=new THREE.CylinderGeometry(outerR,outerR*1.012,height,rSegs,hSegs,false);
  const pos=g.attributes.position;
  const halfH=height/2,backZ=-outerR*0.58,frontZ=outerR*0.92;
  const maxDrop=height*0.14,soften=height*0.042;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i);let y=pos.getY(i);const z=pos.getZ(i);
    const tt=Math.max(0,Math.min(1,(z-backZ)/(frontZ-backZ)));
    const topLim=halfH-maxDrop*Math.pow(tt,1.75);
    if(y>topLim){const ab=y-topLim;y=topLim+ab*Math.max(0,1-ab/soften)*0.18;}
    const sf=Math.abs(x)/outerR;
    if(y>halfH-height*0.05)y-=sf*sf*height*0.001;
    pos.setY(i,y);
  }
  g.computeVertexNormals();return g;
}

function buildFallbackCapGeometry(styleId){
  const R=CAN.capR,H=CAN.capH;
  if(styleId==="standard"){
    const stdMesh=new THREE.Mesh(makeAngledCapGeom(R,H),capMat);
    stdMesh.position.y=H/2;
    capGroup.add(stdMesh);
    const lip=new THREE.Mesh(new THREE.TorusGeometry(R*1.002,0.015,8,96),ringMat);
    lip.rotation.x=Math.PI/2;lip.position.y=0.018;capGroup.add(lip);
  } else if(styleId==="dome"){
    const pts=[];
    for(let i=0;i<=40;i++){
      const tt=i/40;
      if(tt<0.62){pts.push(new THREE.Vector2(R*0.96,tt*H));}
      else{
        const dt=(tt-0.62)/0.38;
        const r=R*0.96*(1-dt*dt);
        const y=tt*H+dt*dt*R*0.28;
        if(r>0.001)pts.push(new THREE.Vector2(r,y));
      }
    }
    capGroup.add(new THREE.Mesh(new THREE.LatheGeometry(pts,96),capMat));
    const lip=new THREE.Mesh(new THREE.TorusGeometry(R*0.96,0.015,8,96),ringMat);
    lip.rotation.x=Math.PI/2;lip.position.y=0.018;capGroup.add(lip);
  } else if(styleId==="slim"){
    const sR=R*0.68,sH=H*1.08;
    const body=new THREE.Mesh(new THREE.CylinderGeometry(sR*0.86,sR,sH,96,1,false),capMat);
    body.position.y=sH/2;capGroup.add(body);
    const top=new THREE.Mesh(new THREE.CylinderGeometry(sR*0.86,sR*0.86,0.04,96),capMat);
    top.position.y=sH+0.02;capGroup.add(top);
    const lip=new THREE.Mesh(new THREE.TorusGeometry(sR,0.015,8,96),ringMat);
    lip.rotation.x=Math.PI/2;lip.position.y=0.018;capGroup.add(lip);
  }
}

function buildCapGeometry(styleId){
  while(capGroup.children.length)capGroup.remove(capGroup.children[0]);

  // Use your imported GLB cap when it is available.
  if(loadedCapModel){
    const model=loadedCapModel.clone(true);
    applyCapMaterialToModel(model);

    // Reset first so bounding-box maths is reliable.
    model.position.set(0,0,0);
    model.rotation.set(0,0,0);
    model.scale.set(1,1,1);

    // If your cap loads lying sideways, uncomment ONE of these lines:
    // model.rotation.x = Math.PI / 2;
    // model.rotation.y = Math.PI / 2;
    // model.rotation.z = Math.PI / 2;

    // Centre the GLB in X/Z and put its bottom on y=0.
    let box=new THREE.Box3().setFromObject(model);
    let size=new THREE.Vector3();
    let center=new THREE.Vector3();
    box.getSize(size);
    box.getCenter(center);

    model.position.x -= center.x;
    model.position.z -= center.z;
    model.position.y -= box.min.y;

    // Scale imported cap to match the can top diameter.
    const targetDiameter=CAN.capR*2.0;
    const currentDiameter=Math.max(size.x,size.z) || 1;
    const scale=targetDiameter/currentDiameter;
    model.scale.setScalar(scale);

    // Recalculate after scale, then make the bottom sit on capGroup base.
    box=new THREE.Box3().setFromObject(model);
    model.position.y -= box.min.y;

    // Fine tune these if needed:
    model.position.y += 0.00; // increase if cap sinks into can, decrease if it floats
    model.scale.multiplyScalar(1.00); // use 0.95 or 1.05 if slightly too big/small

    capGroup.add(model);
    return;
  }

  // Temporary fallback while the GLB is still loading, or if it fails.
  buildFallbackCapGeometry(styleId);
}

/* ════ LABEL TEXTURE — full wrap, correct 52×195mm ratio ════
   Canvas: 1633×1950 (π×52 : 195 = 163.4 : 195 ≈ 0.838)
   labelScale=1.0 → artwork fills full canvas → full 360° wrap ✅
   labelMesh height = CAN.bodyH → stretches to bottom ✅
*/
const LABEL_W=1633,LABEL_H=1950;
let labelTex=null;

function generateLabel(){
  const W=LABEL_W,H=LABEL_H;
  const cv=document.createElement("canvas");cv.width=W;cv.height=H;
  const ctx=cv.getContext("2d");
  /* base coat — neutral aluminium white */
  ctx.fillStyle="#f2f2f2";ctx.fillRect(0,0,W,H);
  /* matte/semi-matte base tint */
  if(S.finish.id==="matte"){
    ctx.fillStyle="rgba(0,0,0,0.04)";ctx.fillRect(0,0,W,H);
  } else if(S.finish.id==="semimatte"){
    ctx.fillStyle="rgba(0,0,0,0.02)";ctx.fillRect(0,0,W,H);
  }
  /* user artwork — drawn first, finish overlay comes after ✅ */
  if(S.designImg&&!S.bareMode){
    const img=S.designImg;
    const dw=W*S.labelScale;
    const dh=H*S.labelScale;
    const dx=(W-dw)/2;
    const dy=H*S.labelPosY-dh/2;
    ctx.drawImage(img,dx,dy,dw,dh);
  }
  /* finish overlays applied OVER artwork so they visibly affect it */
  if(S.finish.id==="matte"){
    /* matte: subtle vignette + desaturation hint */
    const gm=ctx.createLinearGradient(0,0,W,0);
    gm.addColorStop(0,"rgba(0,0,0,0.08)");gm.addColorStop(0.5,"rgba(0,0,0,0)");
    gm.addColorStop(1,"rgba(0,0,0,0.08)");ctx.fillStyle=gm;ctx.fillRect(0,0,W,H);
    ctx.fillStyle="rgba(255,255,255,0.07)";ctx.fillRect(0,0,W,H);
  } else if(S.finish.id==="semimatte"){
    /* semi-matte: narrow soft specular band */
    const gs=ctx.createLinearGradient(W*0.25,0,W*0.55,0);
    gs.addColorStop(0,"rgba(255,255,255,0)");gs.addColorStop(0.5,"rgba(255,255,255,0.14)");
    gs.addColorStop(1,"rgba(255,255,255,0)");ctx.fillStyle=gs;ctx.fillRect(0,0,W,H);
  } else if(S.finish.id==="gloss"){
    /* gloss: bright wide specular highlight band + edge darken */
    const gg=ctx.createLinearGradient(0,0,W,0);
    gg.addColorStop(0,"rgba(0,0,0,0.10)");
    gg.addColorStop(0.28,"rgba(255,255,255,0.20)");
    gg.addColorStop(0.46,"rgba(255,255,255,0.38)");
    gg.addColorStop(0.62,"rgba(255,255,255,0.18)");
    gg.addColorStop(1,"rgba(0,0,0,0.10)");
    ctx.fillStyle=gg;ctx.fillRect(0,0,W,H);
    /* thin bright left-edge specular streak */
    const gstreak=ctx.createLinearGradient(W*0.3,0,W*0.44,0);
    gstreak.addColorStop(0,"rgba(255,255,255,0)");
    gstreak.addColorStop(0.5,"rgba(255,255,255,0.18)");
    gstreak.addColorStop(1,"rgba(255,255,255,0)");
    ctx.fillStyle=gstreak;ctx.fillRect(0,0,W,H);
  } else if(S.finish.id==="pearl"){
    /* pearl: iridescent colour-shift overlay */
    const gp=ctx.createLinearGradient(0,0,W,0);
    gp.addColorStop(0,"rgba(220,200,240,0.22)");
    gp.addColorStop(0.35,"rgba(255,255,255,0.30)");
    gp.addColorStop(0.5,"rgba(200,230,250,0.22)");
    gp.addColorStop(0.65,"rgba(255,255,255,0.30)");
    gp.addColorStop(1,"rgba(220,240,220,0.22)");
    ctx.fillStyle=gp;ctx.fillRect(0,0,W,H);
    /* second pass — subtle shimmer */
    const gp2=ctx.createLinearGradient(W*0.15,0,W*0.55,0);
    gp2.addColorStop(0,"rgba(255,255,255,0)");
    gp2.addColorStop(0.5,"rgba(255,255,255,0.15)");
    gp2.addColorStop(1,"rgba(255,255,255,0)");
    ctx.fillStyle=gp2;ctx.fillRect(0,0,W,H);
  }
  if(labelTex)labelTex.dispose();
  labelTex=new THREE.CanvasTexture(cv);
  labelTex.encoding=THREE.sRGBEncoding;
  labelTex.wrapS=THREE.RepeatWrapping;
  labelTex.offset.x=0.5; /* centre = front face */
  labelMat.map=labelTex;
  labelMat.color.set(0xffffff);
  labelMat.needsUpdate=true;
}

function applyColors(){
  const capHex=S.capMatchBody?BODY_BASE.hex:S.capColor.hex;
  /* Set directly — no lerp, prevents per-frame material dirty + flicker */
  capMat.color.copy(toLinear(capHex));
  capMat.roughness=S.finish.r;
  capMat.metalness=S.finish.m*0.04+0.02;
  tR=S.finish.r;tM=S.finish.m;

}

/* drag to rotate */
let autoSpin=0,isDrag=false,lastX=0;
function startDrag(x){isDrag=true;lastX=x;autoSpin=canGroup.rotation.y;}
function moveDrag(x){if(!isDrag)return;autoSpin+=(x-lastX)*0.012;lastX=x;canGroup.rotation.y=autoSpin;}
function endDrag(){isDrag=false;}
canvas3.addEventListener("mousedown",e=>{startDrag(e.clientX);e.preventDefault();});
window.addEventListener("mousemove",e=>{moveDrag(e.clientX);});
window.addEventListener("mouseup",()=>{endDrag();});
canvas3.addEventListener("touchstart",e=>{startDrag(e.touches[0].clientX);e.preventDefault();},{passive:false});
canvas3.addEventListener("touchmove",e=>{moveDrag(e.touches[0].clientX);e.preventDefault();},{passive:false});
canvas3.addEventListener("touchend",()=>{endDrag();});
canvas3.addEventListener('wheel',e=>{
  e.preventDefault();
  zoomFactor=Math.min(ZOOM_MAX,Math.max(ZOOM_MIN,zoomFactor+(e.deltaY>0?ZOOM_STEP:-ZOOM_STEP)));
  updateCamera();
},{passive:false});
let pinchDist0=null,pinchZoom0=1.0;
canvas3.addEventListener('touchstart',e=>{
  if(e.touches.length===2){pinchDist0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);pinchZoom0=zoomFactor;e.preventDefault();}
},{passive:false});
canvas3.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&pinchDist0!==null){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    zoomFactor=Math.min(ZOOM_MAX,Math.max(ZOOM_MIN,pinchZoom0*(pinchDist0/d)));updateCamera();e.preventDefault();
  }
},{passive:false});
canvas3.addEventListener('touchend',()=>{pinchDist0=null;});

function animate(){
  requestAnimationFrame(animate);
  if(!isDrag){autoSpin+=0.004;canGroup.rotation.y=autoSpin;}
  /* No lerp — direct color set avoids per-frame material dirty flag and flicker */
  renderer.render(scene,camera);
}

      <div class="spr-group"><span class="spr-lbl">${t('studioOpacity')}</span><input type="range" min="0.05" max="1" step="0.05" value="${obj.opacity||1}" style="width:72px;cursor:pointer" oninput="studioSetShapeProp('opacity',this.value)"><span style="font-size:10px;color:var(--muted)">${Math.round((obj.opacity||1)*100)}%</span></div>`;
  } else if(isImage){
    const pct=Math.round((obj.scaleX||1)*obj.width/fabricCanvas.width*100);
    el.innerHTML=`<div class="spr-group"><span class="spr-lbl">Scale</span><input type="range" min="5" max="200" value="${pct}" style="width:90px;cursor:pointer" oninput="(function(v){const o=fabricCanvas.getActiveObject();if(!o)return;const s=v/100*(fabricCanvas.width/o.width);o.set({scaleX:s,scaleY:s});fabricCanvas.renderAll();studioSave();})(this.value)"><span style="font-size:10px;color:var(--muted)">${pct}%</span></div>`;
  } else {el.innerHTML=`<span class="studio-hint">${obj.type}</span>`;}
}
function applyStudio(){
  if(!fabricCanvas)return;studioSave();fabricCanvas.discardActiveObject();fabricCanvas.renderAll();
  function doApply(dataURL){
    const img=new Image();
    img.onload=()=>{S.designImg=img;S.bareMode=false;S.selectedTemplate=null;studioApplied=true;S.labelScale=1.0;S.labelPosY=0.5;generateLabel();rebox();setTimeout(initStudio,30);};
    img.onerror=()=>alert('Image load failed.');
    img.src=dataURL;
  }
  try{const scale=LABEL_W/fabricCanvas.width;doApply(fabricCanvas.toDataURL({format:'png',multiplier:scale,enableRetinaScaling:false}));}
  catch(e1){try{doApply(fabricCanvas.toDataURL({format:'png',enableRetinaScaling:false}));}catch(e2){alert('Export failed. Try removing any uploaded images and re-applying.');}}
}

/* ════ ACTIONS & INIT ════ */
function rebox(){
  renderNav();
  const b=document.getElementById("sbox");
  if(S.step===1)b.innerHTML=rStep1();
  else if(S.step===2)b.innerHTML=rStep2();
  else if(S.step===3)b.innerHTML=rStep3();
  else if(S.step===4)b.innerHTML=rStep4();
  if(S.step===3&&S.artTab==='studio')setTimeout(initStudio,30);
  /* cap only visible from step 2 onwards */
  capGroup.visible=(S.step>=2);
}
function ns(){if(S.step<4){S.step++;rebox();}}
function ps(){if(S.step>1){S.step--;rebox();}}
function goStep(n){S.step=n;rebox();}

/* Index-based size setter — avoids inline string quoting issues in onclick */
let _sizeRef=[];
function setSize(i){S.size=_sizeRef[i];updateCamera();updateBadge();rebox();}

function selectCategory(cat){
  S.category=cat;
  S.prod=PRODUCTS[cat][0];
  S.size=S.prod.sizes[0];
  updateCamera();updateBadge();rebox();
}
function selectProduct(id){
  const prods=PRODUCTS[S.category]||[];
  const p=prods.find(x=>x.id===id);if(!p)return;
  S.prod=p;S.size=p.sizes[0];
  updateCamera();updateBadge();rebox();
}

function pickColor(prop,code){
  const c=PANTONE.find(x=>x.code===code);if(!c)return;
  S[prop]=c;
  if(prop==="capColor"){setLinear(tCapCol,c.hex);applyColors();}
  rebox();
}
function pickHex(prop,hex){
  if(!/^#[0-9a-fA-F]{6}$/.test(hex))return;
  S[prop]={code:"Custom",name:"Custom",hex,f:"N"};
  if(prop==="capColor"){setLinear(tCapCol,hex);applyColors();}
  rebox();
}
function onUpload(e){
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{S.designImg=img;S.labelScale=1.0;S.labelPosY=0.5;generateLabel();rebox();};
    img.src=ev.target.result;
  };
  reader.readAsDataURL(f);
}
function clearDesign(e){
  e.stopPropagation();S.designImg=null;S.selectedTemplate=null;
  const fup=document.getElementById("fup");if(fup)fup.value="";
  generateLabel();rebox();
}

function downloadPDF(){
  const capHex=S.capMatchBody?BODY_BASE.hex:S.capColor.hex;
  const capCode=S.capMatchBody?'Aluminium':S.capColor.code;
  const capStr=S.capMatchBody?t('matchBodyStr')+' \u2014 '+BODY_BASE.name:'PMS '+S.capColor.code+' \u2014 '+S.capColor.name;
  const artStr=S.bareMode?t('sumBare'):S.designImg?t('sumCustomArt'):t('sumNoArt');
  const capName=CAP_STYLES.find(c=>c.id===S.capStyle);
  const now=new Date();
  const dateStr=now.toLocaleDateString(LANG==='ru'?'ru-RU':'en-GB',{day:'2-digit',month:'long',year:'numeric'});
  const rows=[
    [t('sumProduct'),(S.prod?S.prod.name:'')+' \u00b7 '+S.size],
    ['Body','Aluminium (standard)'],
    [t('sumFinish'),S.finish.name],
    [t('sumCapStyle'),capName?t(capName.nameKey):S.capStyle],
    [t('sumCapCol'),capStr],
    [t('sumArtwork'),artStr],
  ];
  renderer.render(scene,camera);
  const renderDataURL=(()=>{try{return renderer.domElement.toDataURL('image/png');}catch(e){return null;}})();
  const rowsHTML=rows.map(([k,v],i)=>`<tr style="background:${i%2===0?'#f0f5fc':'#fff'}"><td style="padding:7px 10px;font-size:12px;color:#64748b;font-weight:600;width:42%">${k}</td><td style="padding:7px 10px;font-size:12px;color:#0f172a;font-weight:700">${v}</td></tr>`).join('');
  const cW=renderer.domElement.width,cH=renderer.domElement.height;
  const imgW=190,imgH=Math.round(imgW*(cH/cW));
  const renderImgHTML=renderDataURL?`<img src="${renderDataURL}" style="width:${imgW}px;height:${imgH}px;border-radius:8px;border:1px solid #dde5f0;background:#1a1c22;display:block">`:'';
  const html=`<div id="pdf-root" style="width:794px;background:#fff;font-family:'Lato','Helvetica Neue',Arial,sans-serif;box-sizing:border-box;overflow:hidden">
    <div style="background:#0d3a7a;padding:18px 28px;display:flex;align-items:center;justify-content:space-between">
      <div><div style="font-size:20px;font-weight:700;color:#fff;letter-spacing:0.5px">AEROSTAR CONTRACT</div>
      <div style="font-size:11px;color:#a0b8d8;margin-top:3px">Packaging Configurator \u2014 Configuration Summary</div></div>
      <div style="font-size:11px;color:#a0b8d8">${dateStr}</div>
    </div>
    <div style="padding:28px;display:flex;gap:24px;align-items:flex-start">
      <div style="flex:1;min-width:0">
        <div style="font-size:10px;font-weight:700;color:#1557b0;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">${t('configSummary')}</div>
        <table style="width:100%;border-collapse:collapse;border:1px solid #dde5f0">${rowsHTML}</table>
        <div style="margin-top:20px;display:flex;gap:14px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:10px;background:#f0f5fc;border-radius:7px;padding:10px 14px;border:1px solid #dde5f0">
            <div style="width:32px;height:32px;border-radius:50%;background:#d4d4d6;border:1px solid rgba(0,0,0,.1);flex-shrink:0"></div>
            <div><div style="font-size:10px;font-weight:700;color:#0a3578">Body</div><div style="font-size:11px;color:#334155">Aluminium</div></div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;background:#f0f5fc;border-radius:7px;padding:10px 14px;border:1px solid #dde5f0">
            <div style="width:32px;height:32px;border-radius:50%;background:${capHex};border:1px solid rgba(0,0,0,.1);flex-shrink:0"></div>
            <div><div style="font-size:10px;font-weight:700;color:#0a3578">Cap</div><div style="font-size:11px;color:#334155">PMS ${capCode}</div></div>
          </div>
        </div>
      </div>
      ${renderImgHTML?`<div style="flex-shrink:0;text-align:center">${renderImgHTML}<div style="font-size:9px;color:#94a3b8;margin-top:5px;font-style:italic">3D Render</div></div>`:''}
    </div>
    <div style="background:#f0f5fc;border-top:1px solid #dde5f0;padding:10px 28px;display:flex;justify-content:space-between">
      <div style="font-size:10px;color:#64748b">aerostar.com</div>
      <div style="font-size:10px;color:#94a3b8">Confidential</div>
      <div style="font-size:10px;color:#64748b">${dateStr}</div>
    </div>
  </div>`;
  const wrapper=document.createElement('div');wrapper.style.cssText='position:fixed;left:-9999px;top:0;z-index:-1';wrapper.innerHTML=html;document.body.appendChild(wrapper);
  const node=wrapper.querySelector('#pdf-root');
  html2canvas(node,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false}).then(canvas=>{
    document.body.removeChild(wrapper);
    const {jsPDF}=window.jspdf;const PW=210;
    const canvasH_mm=(canvas.height/canvas.width)*PW;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    doc.addImage(canvas.toDataURL('image/png'),'PNG',0,0,PW,Math.min(canvasH_mm,297));
    doc.save('Aerostar-Configuration.pdf');
  }).catch(err=>{document.body.removeChild(wrapper);console.error(err);alert('PDF generation failed.');});
}

function sendEmail(){
  const capStr=S.capMatchBody?t('matchBodyStr')+' \u2014 '+BODY_BASE.name:'PMS '+S.capColor.code+' \u2014 '+S.capColor.name;
  const artStr=S.bareMode?'Bare can':S.designImg?'Custom artwork uploaded':'No artwork';
  const subject=encodeURIComponent(t('emailSubject'));
  const body=encodeURIComponent(
    'Aerostar Packaging Configuration Summary\n\n'+
    t('sumProduct')+': '+(S.prod?S.prod.name:'')+' \u00b7 '+S.size+'\n'+
    'Body: Aluminium (standard)\n'+
    t('sumFinish')+': '+S.finish.name+'\n'+
    t('sumCapStyle')+': '+S.capStyle+'\n'+
    t('sumCapCol')+': '+capStr+'\n'+
    t('sumArtwork')+': '+artStr+'\n\n'+
    'Generated using the Aerostar Packaging Configurator.'
  );
  window.location.href=`mailto:?subject=${subject}&body=${body}`;
}

function resetAll(){
  S={step:1,category:"airfresh",prod:PRODUCTS.airfresh[0],size:"300 ml",
    capMatchBody:true,capColor:PANTONE.find(p=>p.code==="877 C"),capStyle:"standard",
    finish:FINISHES[0],designImg:null,labelPosY:0.5,labelScale:1.0,bareMode:false,
    pfam:"All",psearch:"",selectedTemplate:null,artTab:'upload'};
  if(fabricCanvas){fabricCanvas.dispose();fabricCanvas=null;}
  studioJSON=null;studioApplied=false;emojiCat='All';
  setLinear(tCapCol,S.capColor.hex);tR=S.finish.r;tM=S.finish.m;
  buildCapGeometry(S.capStyle);
  updateCamera();generateLabel();applyColors();rebox();
}

/* ════ INIT ════ */
initMobile();
resize();
updateCamera();
generateLabel();
applyColors();
animate();
rebox();
</script>
