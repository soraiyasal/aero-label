<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aerostar Contract — Packaging Configurator</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --blue:#1557b0;--blue2:#1e6fd9;--blue-dark:#0a3578;--blue-nav:#0d3a7a;
  --blue-bg:#f0f5fc;--border:#dde5f0;--bg:#f4f6fb;
  --text:#0f172a;--sub:#334155;--muted:#64748b;--white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);font-size:13px}

/* ─── HEADER ─────────────────────────────────────── */
.top-bar{background:var(--white);border-bottom:1px solid var(--border);height:62px;display:flex;align-items:center;padding:0 40px;justify-content:space-between;flex-shrink:0}
.logo-wrap{display:flex;flex-direction:column;user-select:none;line-height:1;gap:0}
.logo-ltr{display:flex;align-items:center}
.logo-lt{font-size:27px;font-weight:300;color:#5c6b7a;letter-spacing:-.5px}
.logo-contract{font-family:Georgia,serif;font-style:italic;color:var(--blue);font-size:13px;padding-left:63px;margin-top:-1px;letter-spacing:.01em}
.header-right{display:flex;align-items:center;gap:20px}
.hdr-tag{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase}
.hdr-sep{width:1px;height:16px;background:var(--border)}
.hdr-btn{font-size:10.5px;font-weight:700;color:var(--blue);text-decoration:none;border:1.5px solid var(--blue);border-radius:20px;padding:4px 15px;letter-spacing:.4px;transition:all .15s}
.hdr-btn:hover{background:var(--blue);color:#fff}

/* ─── NAV BAR ────────────────────────────────────── */
.nav-bar{background:var(--blue-nav);height:36px;display:flex;align-items:center;padding:0 40px;gap:0;flex-shrink:0}
.nav-bar a{color:rgba(255,255,255,.65);text-decoration:none;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:0 14px;height:36px;display:flex;align-items:center;transition:color .15s}
.nav-bar a:hover{color:#fff}
.nav-bar .spacer{flex:1}
.nb-div{width:1px;height:16px;background:rgba(255,255,255,.15);margin:0 4px}

/* ─── LAYOUT ─────────────────────────────────────── */
.layout{display:grid;grid-template-columns:1fr 440px;height:calc(100vh - 98px)}
.left{overflow-y:auto;padding:22px 32px 32px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.right{position:relative;background:#edf1f7;border-left:1px solid var(--border);overflow:hidden}
#three-canvas{width:100%;height:100%;display:block;cursor:grab}
#three-canvas:active{cursor:grabbing}

/* ─── VIEWER OVERLAYS ────────────────────────────── */
.can-badge{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-radius:6px;padding:8px 14px;pointer-events:none;border:1px solid rgba(255,255,255,.8);box-shadow:0 2px 12px rgba(0,0,0,.08)}
.badge-prod{font-size:11px;font-weight:700;color:var(--blue-dark);letter-spacing:.08em;text-transform:uppercase}
.badge-spec{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.05em}
.drag-hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);opacity:.45;pointer-events:none;display:flex;align-items:center;gap:7px}

/* ─── STEP PROGRESS ──────────────────────────────── */
.step-progress{display:flex;align-items:center;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:16px 22px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sp-item{display:flex;align-items:center;gap:11px;cursor:pointer;flex-shrink:0}
.sp-num{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0;transition:all .2s;letter-spacing:.05em}
.sp-item.active .sp-num{background:var(--blue);border-color:var(--blue);color:#fff}
.sp-item.done .sp-num{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.sp-meta{display:flex;flex-direction:column;gap:1px}
.sp-step{font-size:8.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.sp-label{font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap}
.sp-item.active .sp-label{color:var(--blue-dark)}
.sp-item.active .sp-step{color:var(--blue)}
.sp-item.done .sp-label{color:var(--blue)}
.sp-item.done .sp-step{color:var(--blue);opacity:.6}
.sp-connector{flex:1;height:1px;background:var(--border);margin:0 14px;min-width:16px}
.sp-connector.past{background:var(--blue);opacity:.25}

/* ─── CONTENT CARD ───────────────────────────────── */
.box{background:var(--white);border-radius:8px;border:1px solid var(--border);padding:24px 26px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sec-title{font-size:21px;font-weight:300;color:var(--blue-dark);margin-bottom:20px;letter-spacing:-.3px}
.sec-rule{height:1px;background:var(--border);margin:18px 0}
.field-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:block}

/* ─── CATEGORY TABS ──────────────────────────────── */
.cat-tabs{display:flex;gap:6px;margin-bottom:18px}
.ct{flex:1;padding:11px 10px;border:1.5px solid var(--border);border-radius:7px;background:var(--white);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all .14s;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.2px}
.ct:hover{border-color:var(--blue2)}
.ct.on{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.ct svg{opacity:.7}
.ct.on svg{opacity:1}

/* ─── SIZE PILLS ─────────────────────────────────── */
.size-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.sz{padding:5px 14px;border-radius:4px;border:1px solid var(--border);font-size:11.5px;font-weight:600;cursor:pointer;background:var(--white);color:var(--muted);transition:all .14s;letter-spacing:.3px}
.sz:hover{border-color:var(--blue)}
.sz.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* ─── PRODUCT GRID ───────────────────────────────── */
.prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:18px}
.pcard{border:1px solid var(--border);border-radius:7px;padding:14px 14px;cursor:pointer;transition:all .14s;background:var(--white);display:flex;align-items:center;gap:12px}
.pcard:hover{border-color:var(--blue2);box-shadow:0 2px 8px rgba(21,87,176,.08)}
.pcard.on{border-color:var(--blue);background:var(--blue-bg)}
.pcard-icon{width:32px;flex-shrink:0;display:flex;justify-content:center;color:var(--muted)}
.pcard.on .pcard-icon{color:var(--blue)}
.pcard-text{}
.pcard-name{font-size:12px;font-weight:700;color:var(--text)}
.pcard-sub{font-size:10px;color:var(--muted);margin-top:1px}
.pcard.on .pcard-name{color:var(--blue-dark)}
.pcard.on .pcard-sub{color:var(--blue);opacity:.8}

/* ─── PANTONE PICKER ─────────────────────────────── */
.p-search-wrap{position:relative;margin-bottom:10px}
.p-search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted)}
.psearch{width:100%;padding:8px 11px 8px 32px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:12px;outline:none;color:var(--text);background:var(--white);transition:border-color .14s}
.psearch:focus{border-color:var(--blue)}
.pfam-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.pfam-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:4px;border:1px solid var(--border);font-size:10.5px;font-weight:600;cursor:pointer;background:var(--white);color:var(--muted);transition:all .12s;letter-spacing:.2px}
.pfam-btn:hover{border-color:var(--blue2)}
.pfam-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.pfam-btn.on .pfam-dot{border-color:rgba(255,255,255,.4)}
.pfam-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(0,0,0,.12);flex-shrink:0}
.pgrid-color{display:flex;flex-wrap:wrap;gap:5px;max-height:148px;overflow-y:auto;margin-bottom:10px;padding:1px;scrollbar-width:thin}
.psw{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;position:relative;transition:transform .12s,border-color .12s;flex-shrink:0}
.psw:hover{transform:scale(1.16);z-index:2}
.psw.on{border-color:#0a3578;transform:scale(1.1)}
.psw-tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;font-size:9px;padding:4px 8px;border-radius:4px;white-space:nowrap;pointer-events:none;z-index:40;display:none;line-height:1.5;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.psw-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:#0f172a}
.psw:hover .psw-tip{display:block}
.p-selected{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--blue-bg);border-radius:6px;border:1px solid rgba(21,87,176,.14);margin-bottom:10px;min-height:48px}
.p-sel-swatch{width:32px;height:32px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.1);box-shadow:0 1px 4px rgba(0,0,0,.15)}
.p-sel-info{}
.p-sel-code{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:.5px}
.p-sel-name{font-size:12px;color:var(--text);margin-top:1px}
.custom-row{display:flex;align-items:center;gap:10px;padding-top:4px}
.custom-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);white-space:nowrap}
.custom-row input[type=color]{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);padding:2px;cursor:pointer;background:none;flex-shrink:0}
.hex-input{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:5px;font-size:11.5px;font-family:'Lato',monospace;color:var(--text);outline:none;letter-spacing:.5px}
.hex-input:focus{border-color:var(--blue)}

/* ─── CAP GRID ───────────────────────────────────── */
.cap-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:18px}
.cg{border:1px solid var(--border);border-radius:7px;padding:12px 6px 10px;text-align:center;cursor:pointer;background:var(--white);transition:all .14s}
.cg:hover{border-color:var(--blue2);box-shadow:0 2px 8px rgba(21,87,176,.08)}
.cg.on{border-color:var(--blue);background:var(--blue-bg)}
.cg-icon{display:flex;justify-content:center;align-items:center;height:34px;color:var(--muted);margin-bottom:6px}
.cg.on .cg-icon{color:var(--blue)}
.cg-name{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.3px;line-height:1.3}
.cg.on .cg-name{color:var(--blue)}
.match-toggle{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--border);border-radius:7px;cursor:pointer;background:var(--white);margin-bottom:12px;transition:all .14s}
.match-toggle:hover{border-color:var(--blue)}
.match-toggle.on{border-color:var(--blue);background:var(--blue-bg)}
.match-toggle svg{color:var(--muted);flex-shrink:0}
.match-toggle.on svg{color:var(--blue)}
.match-text{font-size:11.5px;font-weight:600;color:var(--muted)}
.match-toggle.on .match-text{color:var(--blue)}
.match-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0;transition:all .14s}
.match-toggle.on .match-check{background:var(--blue);border-color:var(--blue)}

/* ─── FINISH ─────────────────────────────────────── */
.fin-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:18px}
.fg{border:1px solid var(--border);border-radius:7px;padding:10px 5px 8px;text-align:center;cursor:pointer;background:var(--white);transition:all .14s}
.fg:hover{border-color:var(--blue2)}
.fg.on{border-color:var(--blue);background:var(--blue-bg)}
.fg-ball{width:30px;height:30px;border-radius:50%;margin:0 auto 6px;border:1px solid rgba(0,0,0,.1);box-shadow:0 1px 4px rgba(0,0,0,.12)}
.fg-name{font-size:9.5px;font-weight:700;color:var(--muted);letter-spacing:.3px}
.fg.on .fg-name{color:var(--blue)}

/* ─── BARE TOGGLE ────────────────────────────────── */
.bare-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--blue-bg);border:1px solid rgba(21,87,176,.12);border-radius:7px;margin-bottom:16px}
.bare-lbl{font-size:11.5px;font-weight:600;color:var(--sub)}
.bare-sub{font-size:9.5px;color:var(--muted);margin-top:2px}
.toggle{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tgl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#cbd5e1;border-radius:22px;transition:.25s}
.tgl:before{position:absolute;content:'';height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input:checked+.tgl{background:var(--blue)}
input:checked+.tgl:before{transform:translateX(18px)}

/* ─── UPLOAD ─────────────────────────────────────── */
.upload-zone{border:1.5px dashed var(--border);border-radius:7px;padding:22px;text-align:center;cursor:pointer;background:var(--white);position:relative;transition:all .14s}
.upload-zone:hover,.upload-zone.has{border-color:var(--blue);background:var(--blue-bg)}
.up-icon-wrap{width:40px;height:40px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;color:var(--blue);border:1px solid rgba(21,87,176,.15)}
.upload-zone.has .up-icon-wrap{background:rgba(21,87,176,.08)}
.up-txt{font-size:12.5px;font-weight:600;color:var(--sub)}
.up-hint{font-size:10px;color:var(--muted);margin-top:3px}
.up-preview{width:100%;max-height:70px;object-fit:contain;border-radius:5px;margin-top:12px;display:none}
.up-preview.on{display:block}
.up-clear{position:absolute;top:10px;right:12px;background:#ef4444;border:none;border-radius:4px;color:#fff;padding:3px 10px;font-size:9.5px;cursor:pointer;display:none;font-family:inherit;font-weight:700;letter-spacing:.3px}
.upload-zone.has .up-clear{display:block}
.lsliders{border:1px solid var(--border);border-radius:7px;padding:14px;margin-top:10px;display:none;background:var(--white)}
.lsliders.on{display:block}
.sl-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.sl-row:last-child{margin-bottom:0}
.sl-row label{width:58px;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;flex-shrink:0}
.sl-row input[type=range]{flex:1;height:3px;border-radius:3px;background:var(--border);-webkit-appearance:none;cursor:pointer}
.sl-row input[type=range]::-webkit-slider-thumb{width:14px;height:14px;background:var(--blue);border-radius:50%;-webkit-appearance:none;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px var(--blue)}
.sl-val{width:34px;font-size:10px;color:var(--blue);font-weight:700;text-align:right;letter-spacing:.3px}

/* ─── SUMMARY ────────────────────────────────────── */
.summary{background:var(--blue-bg);border-radius:7px;padding:14px 16px;margin-bottom:20px;border:1px solid rgba(21,87,176,.12)}
.sum-head{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--blue);margin-bottom:10px}
.sum-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(21,87,176,.07)}
.sum-row:last-child{border-bottom:none}
.sk{color:var(--muted)}.sv{font-weight:700;color:var(--blue-dark);text-align:right;max-width:55%}

/* ─── FORM ───────────────────────────────────────── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fc{display:flex;flex-direction:column;gap:5px}
.fc.full{grid-column:1/-1}
.flb{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
.fi{padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;color:var(--text);outline:none;transition:border-color .14s;background:var(--white)}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,87,176,.08)}
.fta{padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;color:var(--text);outline:none;resize:vertical;min-height:64px;transition:border-color .14s;background:var(--white)}
.fta:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,87,176,.08)}

/* ─── BUTTONS ────────────────────────────────────── */
.navrow{display:flex;justify-content:space-between;align-items:center;margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}
.btn-back{padding:9px 20px;border:1px solid var(--border);border-radius:6px;background:var(--white);color:var(--muted);cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:700;transition:all .14s;letter-spacing:.3px}
.btn-back:hover{border-color:var(--blue);color:var(--blue)}
.btn-next{padding:9px 24px;border:none;border-radius:6px;background:var(--blue);color:#fff;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:700;display:inline-flex;align-items:center;gap:6px;letter-spacing:.3px;transition:background .14s}
.btn-next:hover{background:var(--blue-dark)}
.btn-next svg{flex-shrink:0}

/* ─── SUCCESS ────────────────────────────────────── */
.success-wrap{text-align:center;padding:36px 20px}
.ok-mark{width:60px;height:60px;border-radius:50%;background:var(--blue-bg);border:2px solid var(--blue);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:var(--blue)}
</style>
</head>
<body>

<!-- HEADER -->
<div class="top-bar">
  <div class="logo-wrap">
    <div class="logo-ltr">
      <span class="logo-lt">aer</span>
      <svg viewBox="0 0 30 30" width="30" height="30" style="display:inline-block;vertical-align:middle">
        <path d="M15,0 A15,15 0,0,0 15,30 Z" fill="#5c6b7a"/>
        <path d="M15,0 A15,15 0,0,1 15,30 Z" fill="#1557b0"/>
        <polygon points="15,4.5 17.3,11.5 24.5,11.5 18.8,15.8 21.1,22.8 15,18.5 8.9,22.8 11.2,15.8 5.5,11.5 12.7,11.5" fill="white"/>
      </svg>
      <span class="logo-lt">star</span>
    </div>
    <div class="logo-contract">Contract</div>
  </div>
  <div class="header-right">
    <span class="hdr-tag">Packaging Configurator</span>
    <div class="hdr-sep"></div>
    <a href="#" class="hdr-btn">Feedback</a>
  </div>
</div>

<!-- NAV BAR -->
<div class="nav-bar">
  <a href="#">About Us</a><a href="#">Our Services</a><a href="#">Products</a>
  <div class="nb-div"></div><a href="#">Contacts</a>
  <div class="spacer"></div>
  <a href="#">Online Catalog</a><a href="#">Website</a>
</div>

<!-- MAIN LAYOUT -->
<div class="layout">
  <div class="left">
    <div id="snav"></div>
    <div class="box" id="sbox"></div>
  </div>
  <div class="right">
    <canvas id="three-canvas"></canvas>
    <div class="can-badge">
      <div class="badge-prod" id="bdg-name">Select a Product</div>
      <div class="badge-spec" id="bdg-sub">Configure your packaging below</div>
    </div>
    <div class="drag-hint">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12H3m6-6-6 6 6 6"/><path d="M3 12h18m-6-6 6 6-6 6"/></svg>
      Drag to rotate
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   SVG ICON LIBRARY
══════════════════════════════════════════════ */
const IC={

/* ── THREE.JS CONSTANTS ─────────────────────────── */
const REF_BR=0.52,REF_BH=1.72,REF_DOME_SY=0.148;
const REF_SH=0.48,REF_NR=0.35,REF_NH=0.09,REF_CAP_FLARE=1.15;
const REF_BY=REF_BR*REF_DOME_SY;
const REF_SY=REF_BY+REF_BH,REF_NY=REF_SY+REF_SH;
const REF_CAP_BASE=REF_NY+REF_NH,REF_CAP_H=REF_BH*0.28;
const REF_TOTAL=REF_CAP_BASE+REF_CAP_H;

let bodyMat=new THREE.MeshStandardMaterial({color:new THREE.Color(S.bodyColor.hex),roughness:S.finish.r,metalness:S.finish.m});
let labelMat=new THREE.MeshStandardMaterial({roughness:S.finish.r,metalness:S.finish.m,transparent:true});
let capMat=new THREE.MeshStandardMaterial({color:new THREE.Color(S.capColor.hex),roughness:0.45,metalness:0.18});
let actMat=new THREE.MeshStandardMaterial({color:0x2a2a30,roughness:0.72,metalness:0.15});
let tBodyCol=new THREE.Color(S.bodyColor.hex);
let tCapCol=new THREE.Color(S.capColor.hex);
let tR=S.finish.r,tM=S.finish.m;
let labelTex=null;
const canGroup=new THREE.Group(); scene.add(canGroup);

function getMasterScale(){return S.size.scale*((S.prod.sx+S.prod.sy)/2);}

function buildCan(){
  while(canGroup.children.length){const c=canGroup.children[0];if(c.geometry)c.geometry.dispose();canGroup.remove(c);}
  const cs=S.capType.cs, CR=REF_NR*REF_CAP_FLARE*cs.r, CBH=REF_CAP_H*cs.h, by=REF_CAP_BASE;
  const dome=new THREE.Mesh(new THREE.SphereGeometry(REF_BR,48,24,0,Math.PI*2,0,Math.PI*0.48),bodyMat);
  dome.scale.y=REF_DOME_SY; dome.position.y=0.008; canGroup.add(dome);
  const body=new THREE.Mesh(new THREE.CylinderGeometry(REF_BR,REF_BR,REF_BH,64,1),bodyMat);
  body.position.y=REF_BY+REF_BH/2; canGroup.add(body);
  if(!S.bareMode){
    const lc=new THREE.Mesh(new THREE.CylinderGeometry(REF_BR+0.003,REF_BR+0.003,REF_BH,72,1,true),labelMat);
    lc.position.y=REF_BY+REF_BH/2; canGroup.add(lc);
  }
  const pts=[]; for(let i=0;i<=28;i++){const t=i/28;pts.push(new THREE.Vector2(REF_BR*(1-t)+REF_NR*t-(t*t*0.03),t*REF_SH));}
  const sh=new THREE.Mesh(new THREE.LatheGeometry(pts,56),bodyMat); sh.position.y=REF_SY; canGroup.add(sh);
  const neck=new THREE.Mesh(new THREE.CylinderGeometry(REF_NR,REF_NR,REF_NH,32),bodyMat); neck.position.y=REF_NY+REF_NH/2; canGroup.add(neck);
  switch(S.capType.id){
    case'std':{const cb=new THREE.Mesh(new THREE.CylinderGeometry(CR,CR*0.94,CBH,48),capMat); cb.position.y=by+CBH/2; canGroup.add(cb); const dc=new THREE.Mesh(new THREE.SphereGeometry(CR,32,16,0,Math.PI*2,0,Math.PI*0.52),capMat); dc.position.y=by+CBH; canGroup.add(dc); const act=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.05,0.10),actMat); act.position.set(0,by+CBH*0.58,CR+0.035); canGroup.add(act); const nz=new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.012,0.09,8),actMat); nz.rotation.x=Math.PI/2; nz.position.set(0,by+CBH*0.58+0.012,CR+0.085); canGroup.add(nz); break;}
    case'cone':{const ring=new THREE.Mesh(new THREE.CylinderGeometry(CR,CR*0.92,CBH*0.22,48),capMat); ring.position.y=by+CBH*0.11; canGroup.add(ring); const cone=new THREE.Mesh(new THREE.CylinderGeometry(CR*0.28,CR*0.86,CBH*0.78,36),capMat); cone.position.y=by+CBH*0.22+CBH*0.39; canGroup.add(cone); const tip=new THREE.Mesh(new THREE.SphereGeometry(0.028,14),capMat); tip.position.y=by+CBH; canGroup.add(tip); break;}
    case'wide':{const wc=new THREE.Mesh(new THREE.CylinderGeometry(CR,CR*0.96,CBH,48),capMat); wc.position.y=by+CBH/2; canGroup.add(wc); const td=new THREE.Mesh(new THREE.CylinderGeometry(CR*0.98,CR*0.98,0.034,48),capMat); td.position.y=by+CBH; canGroup.add(td); break;}
    case'trigger':{const bt=new THREE.Mesh(new THREE.CylinderGeometry(CR*0.94,CR*0.88,CBH,48),capMat); bt.position.y=by+CBH/2; canGroup.add(bt); const bar=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.055,CR*1.9),actMat); bar.position.set(0,by+CBH*0.6,0); canGroup.add(bar); const lev=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.13,0.08),actMat); lev.position.set(0,by+CBH*0.28,CR*0.48); canGroup.add(lev); const nz2=new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.012,0.1,8),actMat); nz2.rotation.x=Math.PI/2; nz2.position.set(0,by+CBH*0.6+0.01,CR+0.07); canGroup.add(nz2); break;}
    case'flat':{const fb=new THREE.Mesh(new THREE.CylinderGeometry(CR,CR*0.94,CBH,48),capMat); fb.position.y=by+CBH/2; canGroup.add(fb); const fd=new THREE.Mesh(new THREE.CylinderGeometry(CR*0.98,CR*0.98,0.03,48),capMat); fd.position.y=by+CBH; canGroup.add(fd); const btn=new THREE.Mesh(new THREE.CylinderGeometry(CR*0.35,CR*0.35,0.045,24),actMat); btn.position.y=by+CBH+0.028; canGroup.add(btn); break;}
  }
  const m=getMasterScale(); canGroup.scale.set(m,m,m); updateCamera();
}

function updateCamera(){
  const th=REF_TOTAL*getMasterScale(), my=canGroup.position.y+th/2;
  camera.position.set(0,my+0.2,Math.max(4.8,th*1.12));
  camera.lookAt(0,my,0);
}

function generateLabel(){
  if(S.bareMode){labelMat.map=null;labelMat.needsUpdate=true;return;}
  const W=1024,H=512;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle=S.bodyColor.hex; ctx.fillRect(0,0,W,H);
  if(S.finish.id==='metallic'||S.finish.id==='chrome'){
    const g=ctx.createLinearGradient(0,0,W,0);
    g.addColorStop(0,'rgba(0,0,0,.18)'); g.addColorStop(.22,'rgba(255,255,255,.10)');
    g.addColorStop(.50,'rgba(255,255,255,.22)'); g.addColorStop(.78,'rgba(255,255,255,.08)');
    g.addColorStop(1,'rgba(0,0,0,.15)'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }
  if(S.designImg){
    const img=S.designImg, drawW=W*S.labelScale, drawH=(drawW/img.width)*img.height;
    ctx.drawImage(img,(W-drawW)/2,H*S.labelPosY-drawH/2,drawW,drawH);
  }
  if(labelTex) labelTex.dispose();
  labelTex=new THREE.CanvasTexture(cv); labelTex.encoding=THREE.sRGBEncoding;
  labelMat.map=labelTex; labelMat.color.set(0xffffff);
  labelMat.roughness=S.finish.r; labelMat.metalness=S.finish.m; labelMat.needsUpdate=true;
}

let rotY=0,autoSpin=0,isDrag=false,lastX=0;
canvas3.addEventListener('mousedown',e=>{isDrag=true;lastX=e.clientX;rotY=canGroup.rotation.y;autoSpin=0;});
window.addEventListener('mousemove',e=>{if(isDrag){rotY+=(e.clientX-lastX)*0.012;lastX=e.clientX;}});
window.addEventListener('mouseup',()=>{isDrag=false;});
canvas3.addEventListener('touchstart',e=>{isDrag=true;lastX=e.touches[0].clientX;rotY=canGroup.rotation.y;autoSpin=0;e.preventDefault();},{passive:false});
canvas3.addEventListener('touchmove',e=>{if(isDrag){rotY+=(e.touches[0].clientX-lastX)*0.012;lastX=e.touches[0].clientX;}e.preventDefault();},{passive:false});
canvas3.addEventListener('touchend',()=>{isDrag=false;});

function animate(){
  requestAnimationFrame(animate);
  if(!isDrag) autoSpin+=0.005;
  canGroup.rotation.y=rotY+autoSpin;
  bodyMat.color.lerp(tBodyCol,0.09);
  bodyMat.roughness+=(tR-bodyMat.roughness)*0.09;
  bodyMat.metalness+=(tM-bodyMat.metalness)*0.09;
  capMat.color.lerp(S.capMatchBody?tBodyCol:tCapCol,0.09);
  renderer.render(scene,camera);
}

function resize(){
  const r=document.querySelector('.right');
  renderer.setSize(r.clientWidth,r.clientHeight);
  camera.aspect=r.clientWidth/r.clientHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize);

function updateBadge(){
  document.getElementById('bdg-name').textContent=S.prod.name.toUpperCase()+' · '+S.size.ml;
  document.getElementById('bdg-sub').textContent='PMS '+S.bodyColor.code+' · '+S.finish.name+' Finish';
}

const NAV_STEPS=[
  {n:'01',label:'Can Selection'},
  {n:'02',label:'Body Colour'},
  {n:'03',label:'Cap & Finish'},
  {n:'04',label:'Design & Artwork'},
];
function renderNav(){
  document.getElementById('snav').innerHTML=`<div class="step-progress">`+
    NAV_STEPS.map((st,i)=>{
      const s=i+1, isActive=s===S.step, isDone=s<S.step;
      const cl=isActive?'sp-item active':isDone?'sp-item done':'sp-item';
      const numContent=isDone?IC.check:st.n;
      return`${i>0?`<div class="sp-connector${isDone?' past':''}"></div>`:''}
        <div class="${cl}" onclick="if(${s}<=${S.step})goStep(${s})">
          <div class="sp-num">${numContent}</div>
          <div class="sp-meta">
            <div class="sp-step">Step ${st.n}</div>
            <div class="sp-label">${st.label}</div>
          </div>
        </div>`;
    }).join('')+`</div>`;
}

/* ══════════════════════════════════════════════
   PANTONE PICKER COMPONENT
══════════════════════════════════════════════ */
function renderPicker(prop){
  const cur=S[prop];
  const fams=['All','R','O','Y','G','B','P','K','N','M'];
  const q=S.psearch.toLowerCase();
  let list=S.pfam==='All'?PANTONE:PANTONE.filter(c=>c.f===S.pfam);
  if(q) list=PANTONE.filter(c=>c.code.toLowerCase().includes(q)||c.name.toLowerCase().includes(q));

  const famH=fams.map(f=>{
    const dot=f!=='All'?`<span class="pfam-dot" style="background:${FAM_COL[f]}"></span>`:'';
    return`<div class="pfam-btn${S.pfam===f?' on':''}" onclick="S.pfam='${f}';S.psearch='';rebox()">${dot}${FAM_NAME[f]}</div>`;
  }).join('');

  const swH=list.map(c=>{
    const sh=c.met?'box-shadow:inset 0 0 0 1px rgba(255,255,255,.3),0 1px 4px rgba(0,0,0,.25)':'box-shadow:0 1px 4px rgba(0,0,0,.18)';
    return`<div class="psw${cur&&cur.code===c.code?' on':''}" style="background:${c.hex};${sh}"
      onclick="pickColor('${prop}','${c.code}')">
      <span class="psw-tip">PMS ${c.code} — ${c.name}</span></div>`;
  }).join('');

  const selH=cur?`<div class="p-selected">
    <div class="p-sel-swatch" style="background:${cur.hex}"></div>
    <div class="p-sel-info">
      <div class="p-sel-code">PMS ${cur.code}</div>
      <div class="p-sel-name">${cur.name}</div>
    </div>
  </div>`:`<div class="p-selected" style="opacity:.4;font-size:11px;color:var(--muted)">No colour selected</div>`;

  return`<div class="p-search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="psearch" placeholder="Search PMS code or colour name…" value="${S.psearch}" oninput="S.psearch=this.value;rebox()">
  </div>
  <div class="pfam-row">${famH}</div>
  <div class="pgrid-color">${swH||'<span style="font-size:11px;color:var(--muted);padding:4px">No results</span>'}</div>
  ${selH}
  <div class="custom-row">
    <span class="custom-lbl">Custom</span>
    <input type="color" value="${cur?cur.hex:'#1557b0'}" onchange="pickHex('${prop}',this.value)">
    <input class="hex-input" type="text" placeholder="#RRGGBB" value="${cur?cur.hex:''}"
      oninput="if(this.value.match(/^#[0-9a-fA-F]{6}$/)) pickHex('${prop}',this.value)">
  </div>`;
}

/* ══════════════════════════════════════════════
   STEP RENDERERS
══════════════════════════════════════════════ */
function rStep1(){
  const cats={beauty:'Beauty & Personal Care',airfresh:'Air Freshener & Home'};
  const catIco={beauty:IC.can,airfresh:IC.spray};
  const prods=PRODUCTS[S.category];
  return`<h2 class="sec-title">Can Selection</h2>
    <span class="field-label">Product Category</span>
    <div class="cat-tabs">
      ${Object.entries(cats).map(([k,v])=>`<div class="ct${S.category===k?' on':''}"
        onclick="S.category='${k}';S.prod=PRODUCTS['${k}'][0];rebox()">
        <span style="display:flex;align-items:center">${catIco[k]}</span>${v}
      </div>`).join('')}
    </div>
    <span class="field-label">Product Type</span>
    <div class="prod-grid">
      ${prods.map(p=>`<div class="pcard${S.prod.id===p.id?' on':''}"
        onclick="S.prod=PRODUCTS[S.category].find(x=>x.id==='${p.id}');buildCan();updateBadge();rebox()">
        <div class="pcard-icon">${IC.can}</div>
        <div class="pcard-text">
          <div class="pcard-name">${p.name}</div>
          <div class="pcard-sub">${p.sub}</div>
        </div>
      </div>`).join('')}
    </div>
    <span class="field-label">Fill Volume</span>
    <div class="size-row">
      ${SIZES.map(sz=>`<div class="sz${S.size.ml===sz.ml?' on':''}"
        onclick="S.size=SIZES.find(x=>x.ml==='${sz.ml}');buildCan();updateBadge();rebox()">${sz.ml}</div>`).join('')}
    </div>
    <div class="navrow"><div></div>
      <button class="btn-next" onclick="ns()">Body Colour ${IC.chevron}</button></div>`;
}

function rStep2(){
  return`<h2 class="sec-title">Body Colour</h2>
    <span class="field-label">Pantone Colour Selection</span>
    ${renderPicker('bodyColor')}
    <div class="navrow">
      <button class="btn-back" onclick="ps()">Back</button>
      <button class="btn-next" onclick="ns()">Cap & Finish ${IC.chevron}</button>
    </div>`;
}

function rStep3(){
  return`<h2 class="sec-title">Cap & Finish</h2>
    <span class="field-label">Cap Profile</span>
    <div class="cap-grid">
      ${CAP_TYPES.map(ct=>`<div class="cg${S.capType.id===ct.id?' on':''}"
        onclick="S.capType=CAP_TYPES.find(x=>x.id==='${ct.id}');buildCan();rebox()">
        <div class="cg-icon">${CAP_SVG[ct.id]}</div>
        <div class="cg-name">${ct.name}</div>
        <div style="font-size:8.5px;color:var(--muted);margin-top:2px;letter-spacing:.2px">${ct.sub}</div>
      </div>`).join('')}
    </div>
    <span class="field-label">Surface Finish</span>
    <div class="fin-grid">
      ${FINISHES.map(f=>`<div class="fg${S.finish.id===f.id?' on':''}"
        onclick="S.finish=FINISHES.find(x=>x.id==='${f.id}');tR=S.finish.r;tM=S.finish.m;generateLabel();updateBadge();rebox()">
        <div class="fg-ball" style="background:${f.ball}"></div>
        <div class="fg-name">${f.name}</div>
      </div>`).join('')}
    </div>
    <span class="field-label">Cap Colour</span>
    <div class="match-toggle${S.capMatchBody?' on':''}" onclick="S.capMatchBody=!S.capMatchBody;rebox()">
      ${IC.match}
      <span class="match-text">${S.capMatchBody?'Matched to body colour — click to change':'Match body colour'}</span>
      <div class="match-check">${S.capMatchBody?IC.check:''}</div>
    </div>
    ${!S.capMatchBody?renderPicker('capColor'):''}
    <div class="navrow">
      <button class="btn-back" onclick="ps()">Back</button>
      <button class="btn-next" onclick="ns()">Design & Artwork ${IC.chevron}</button>
    </div>`;
}

function rStep4(){
  const hasImg=!!S.designImg;
  return`<h2 class="sec-title">Design & Artwork</h2>
    <div class="bare-row">
      <div>
        <div class="bare-lbl">Bare Can Mode</div>
        <div class="bare-sub">Apply uniform colour only — no label wrap</div>
      </div>
      <label class="toggle"><input type="checkbox" ${S.bareMode?'checked':''}
        onchange="S.bareMode=this.checked;buildCan();generateLabel();rebox()"><span class="tgl"></span></label>
    </div>
    ${!S.bareMode?`<span class="field-label">Artwork File
      <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:9.5px;margin-left:4px">PNG or JPG — maps 360° around the can surface</span>
    </span>
    <div class="upload-zone${hasImg?' has':''}" onclick="document.getElementById('fup').click()">
      <input type="file" id="fup" accept="image/*" style="display:none" onchange="onUpload(event)">
      ${!hasImg?`<div class="up-icon-wrap">${IC.upload}</div>
        <div class="up-txt">Upload Artwork File</div>
        <div class="up-hint">PNG · JPG · Recommended width 2400 px</div>`:''}
      <img id="uprev" class="up-preview${hasImg?' on':''}" src="${hasImg?S.designImg.src:''}">
      <button class="up-clear" onclick="clearDesign(event)">Remove</button>
    </div>
    ${hasImg?`<div class="lsliders on">
      <div class="sl-row">
        <label>Position</label>
        <input type="range" min="15" max="85" value="${Math.round(S.labelPosY*100)}"
          oninput="S.labelPosY=this.value/100;document.getElementById('lpyv').textContent=this.value+'%';generateLabel()">
        <span class="sl-val" id="lpyv">${Math.round(S.labelPosY*100)}%</span>
      </div>
      <div class="sl-row">
        <label>Scale</label>
        <input type="range" min="30" max="110" value="${Math.round(S.labelScale*100)}"
          oninput="S.labelScale=this.value/100;document.getElementById('lscv').textContent=this.value+'%';generateLabel()">
        <span class="sl-val" id="lscv">${Math.round(S.labelScale*100)}%</span>
      </div>
    </div>`:''}`:
    `<div style="padding:16px 0;font-size:12px;color:var(--muted);text-align:center;letter-spacing:.3px">
      Bare can — colour coat applied without label artwork
    </div>`}
    <div class="navrow">
      <button class="btn-back" onclick="ps()">Back</button>
      <button class="btn-next" onclick="ns()">Review & Submit ${IC.chevron}</button>
    </div>`;
}

function rStep5(){
  const capStr=S.capMatchBody
    ?'Match Body — '+S.bodyColor.name
    :'PMS '+S.capColor.code+' — '+S.capColor.name;
  return`<h2 class="sec-title">Review & Submit</h2>
    <div class="summary">
      <div class="sum-head">Configuration Summary</div>
      <div class="sum-row"><span class="sk">Product</span><span class="sv">${S.prod.name} · ${S.size.ml}</span></div>
      <div class="sum-row"><span class="sk">Body Colour</span><span class="sv">PMS ${S.bodyColor.code} — ${S.bodyColor.name}</span></div>
      <div class="sum-row"><span class="sk">Surface Finish</span><span class="sv">${S.finish.name}</span></div>
      <div class="sum-row"><span class="sk">Cap Profile</span><span class="sv">${S.capType.name} ${S.capType.sub}</span></div>
      <div class="sum-row"><span class="sk">Cap Colour</span><span class="sv">${capStr}</span></div>
      <div class="sum-row"><span class="sk">Artwork</span><span class="sv">${S.bareMode?'Bare can':S.designImg?'Custom artwork uploaded':'No artwork'}</span></div>
    </div>
    <span class="field-label">Contact Details</span>
    <div class="form-grid">
      <div class="fc"><div class="flb">First Name</div><input class="fi" type="text" placeholder="First name"></div>
      <div class="fc"><div class="flb">Company</div><input class="fi" type="text" placeholder="Organisation"></div>
    </div>
    <div class="form-grid">
      <div class="fc"><div class="flb">Email Address</div><input class="fi" type="email" placeholder="name@company.com"></div>
      <div class="fc"><div class="flb">Telephone</div><input class="fi" type="tel" placeholder="+00 000 000 0000"></div>
    </div>
    <div class="form-grid">
      <div class="fc"><div class="flb">Required Quantity</div>
        <select class="fi"><option>1 000 – 5 000 units</option><option>5 000 – 10 000 units</option><option>10 000 – 50 000 units</option><option>50 000+ units</option></select>
      </div>
      <div class="fc"><div class="flb">Lead Time Required</div>
        <select class="fi"><option>Standard — 8 to 12 weeks</option><option>Express — 4 to 6 weeks</option><option>No fixed deadline</option></select>
      </div>
    </div>
    <div class="form-grid"><div class="fc full"><div class="flb">Additional Notes</div>
      <textarea class="fta" placeholder="Special requirements, certifications, or questions…"></textarea>
    </div></div>
    <div class="navrow">
      <button class="btn-back" onclick="ps()">Back</button>
      <button class="btn-next" onclick="submitForm()">Submit Request ${IC.chevron}</button>
    </div>`;
}

/* ── ACTIONS ────────────────────────────────────── */
function rebox(){
  renderNav();
  const b=document.getElementById('sbox');
  if(S.step===1) b.innerHTML=rStep1();
  else if(S.step===2) b.innerHTML=rStep2();
  else if(S.step===3) b.innerHTML=rStep3();
  else if(S.step===4) b.innerHTML=rStep4();
  else if(S.step===5) b.innerHTML=rStep5();
}
function ns(){if(S.step<5){S.step++;rebox();}}
function ps(){if(S.step>1){S.step--;rebox();}}
function goStep(n){S.step=n;rebox();}
function pickColor(prop,code){
  const c=PANTONE.find(x=>x.code===code); if(!c)return;
  S[prop]=c;
  if(prop==='bodyColor'){tBodyCol=new THREE.Color(c.hex);generateLabel();updateBadge();}
  if(prop==='capColor'){tCapCol=new THREE.Color(c.hex);}
  rebox();
}
function pickHex(prop,hex){
  if(!/^#[0-9a-fA-F]{6}$/.test(hex))return;
  S[prop]={code:'Custom',name:'Custom colour',hex,f:'N'};
  if(prop==='bodyColor'){tBodyCol=new THREE.Color(hex);generateLabel();updateBadge();}
  if(prop==='capColor'){tCapCol=new THREE.Color(hex);}
  rebox();
}
function onUpload(e){
  const f=e.target.files[0]; if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{const img=new Image(); img.onload=()=>{S.designImg=img;generateLabel();rebox();}; img.src=ev.target.result;};
  reader.readAsDataURL(f);
}
function clearDesign(e){
  e.stopPropagation(); S.designImg=null;
  const fup=document.getElementById('fup'); if(fup)fup.value='';
  generateLabel(); rebox();
}
function submitForm(){
  document.getElementById('sbox').innerHTML=`<div class="success-wrap">
    <div class="ok-mark">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div style="font-size:21px;font-weight:300;color:var(--blue-dark);margin-bottom:10px;letter-spacing:-.2px">Request Submitted</div>
    <div style="font-size:13px;color:var(--muted);line-height:1.7;max-width:320px;margin:0 auto">
      Your packaging specification has been received.<br>A member of the Aerostar team will respond within one business day.
    </div>
    <button class="btn-next" style="margin:24px auto 0;display:inline-flex" onclick="resetAll()">New Configuration ${IC.chevron}</button>
  </div>`;
}
function resetAll(){
  S={step:1,category:'beauty',prod:PRODUCTS.beauty[0],size:SIZES[2],
    bodyColor:PANTONE.find(p=>p.code==='877 C'),capMatchBody:false,
    capColor:PANTONE.find(p=>p.code==='Black C'),capType:CAP_TYPES[0],
    finish:FINISHES[1],designImg:null,labelPosY:0.48,labelScale:0.82,bareMode:false,
    pfam:'All',psearch:''};
  tBodyCol=new THREE.Color(S.bodyColor.hex); tCapCol=new THREE.Color(S.capColor.hex);
  tR=S.finish.r; tM=S.finish.m;
  buildCan(); generateLabel(); updateBadge(); rebox();
}

/* ── INIT ───────────────────────────────────────── */
resize(); buildCan(); generateLabel(); updateBadge(); rebox(); animate();
</script>
</body>
</html>
