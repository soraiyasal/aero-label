<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aerostar Contract — Packaging Configurator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1557b0;--blue2:#1e6fd9;--blue-dark:#0a3578;--blue-nav:#0d3a7a;
  --blue-bg:#f0f5fc;--border:#dde5f0;--bg:#f4f6fb;
  --text:#0f172a;--sub:#334155;--muted:#64748b;--white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:"Lato",sans-serif;background:var(--bg);color:var(--text);font-size:13px;overflow-x:hidden}

/* ── HEADER ── */
.top-bar{background:var(--white);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 16px;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;flex-direction:column;user-select:none;line-height:1;flex-shrink:0}
.logo-ltr{display:flex;align-items:center}
.logo-lt{font-size:24px;font-weight:300;color:#5c6b7a;letter-spacing:-.5px}
.logo-contract{font-family:Georgia,serif;font-style:italic;color:var(--blue);font-size:12px;padding-left:56px;margin-top:-1px}
.hdr-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.hdr-tag{font-size:9.5px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.hdr-sep{width:1px;height:14px;background:var(--border);flex-shrink:0}
.hdr-btn{font-size:10px;font-weight:700;color:var(--blue);text-decoration:none;border:1.5px solid var(--blue);border-radius:20px;padding:3px 12px;white-space:nowrap;transition:all .15s}
.hdr-btn:hover{background:var(--blue);color:#fff}

.nav-bar{background:var(--blue-nav);height:34px;display:flex;align-items:center;padding:0 16px;flex-shrink:0;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:52px;z-index:99}.nav-bar::-webkit-scrollbar{display:none}
.nav-bar a{color:rgba(255,255,255,.65);text-decoration:none;font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:0 10px;height:34px;display:flex;align-items:center;transition:color .15s;white-space:nowrap;flex-shrink:0}
.nav-bar a:hover{color:#fff}
.nav-bar .spacer{flex:1}
.nb-div{width:1px;height:14px;background:rgba(255,255,255,.15);margin:0 2px;flex-shrink:0}

/* ── MAIN LAYOUT ── */
.layout{display:grid;grid-template-columns:minmax(0,1fr) 400px;height:calc(100vh - 86px);overflow:hidden}

/* ── LEFT PANEL ── */
.left{
  overflow-y:auto;
  overflow-x:hidden;
  padding:18px 20px 28px;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
  min-width:0;
}

/* ── RIGHT PANEL (3D viewer) ── */
.right{position:relative;background:radial-gradient(ellipse at 50% 40%,#f8f9fc 0%,#e6eaf2 100%);border-left:1px solid var(--border);overflow:hidden;flex-shrink:0}
#c3{width:100%;height:100%;display:block;cursor:grab;touch-action:none;user-select:none}
#c3:active{cursor:grabbing}
.can-badge{position:absolute;top:14px;left:14px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-radius:6px;padding:7px 12px;pointer-events:none;border:1px solid rgba(255,255,255,.8);box-shadow:0 2px 12px rgba(0,0,0,.08);max-width:200px}
.badge-prod{font-size:10.5px;font-weight:700;color:var(--blue-dark);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge-spec{font-size:8.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drag-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);opacity:.4;pointer-events:none;display:flex;align-items:center;gap:6px;white-space:nowrap}

/* ── STEP PROGRESS ── */
.step-progress{display:flex;align-items:center;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden}
.sp-item{display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0;min-width:0}
.sp-num{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0;transition:all .2s}
.sp-item.active .sp-num{background:var(--blue);border-color:var(--blue);color:#fff}
.sp-item.done .sp-num{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.sp-meta{display:flex;flex-direction:column;gap:1px;min-width:0}
.sp-step{font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
.sp-label{font-size:10.5px;font-weight:600;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp-item.active .sp-label{color:var(--blue-dark)}.sp-item.active .sp-step{color:var(--blue)}
.sp-item.done .sp-label,.sp-item.done .sp-step{color:var(--blue);opacity:.8}
.sp-connector{flex:1;height:1px;background:var(--border);margin:0 8px;min-width:8px}
.sp-connector.past{background:var(--blue);opacity:.3}

/* ── CONTENT BOX ── */
.box{background:var(--white);border-radius:8px;border:1px solid var(--border);padding:20px 20px;box-shadow:0 1px 3px rgba(0,0,0,.04);min-width:0;overflow:hidden}
.sec-title{font-size:18px;font-weight:300;color:var(--blue-dark);margin-bottom:16px;letter-spacing:-.2px}
.field-label{font-size:8.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin-bottom:7px;display:block}

/* ── CATEGORY TABS ── */
.cat-tabs{display:flex;gap:6px;margin-bottom:16px}
.ct{flex:1;padding:9px 6px;border:1.5px solid var(--border);border-radius:7px;background:var(--white);color:var(--muted);font-size:10.5px;font-weight:700;cursor:pointer;text-align:center;transition:all .12s;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ct:hover{border-color:var(--blue2)}.ct.on{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}

/* ── SIZE PILLS ── */
.size-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.sz{padding:4px 11px;border-radius:4px;border:1px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;background:var(--white);color:var(--muted);transition:all .14s;letter-spacing:.2px;white-space:nowrap}
.sz:hover{border-color:var(--blue)}.sz.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── PRODUCT CARDS ── */
.prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:16px}
.pcard{border:1px solid var(--border);border-radius:7px;padding:11px 10px;cursor:pointer;transition:all .14s;background:var(--white);display:flex;align-items:center;gap:10px;min-width:0;overflow:hidden}
.pcard:hover{border-color:var(--blue2);box-shadow:0 2px 8px rgba(21,87,176,.08)}.pcard.on{border-color:var(--blue);background:var(--blue-bg)}
.pcard-icon{width:24px;flex-shrink:0;display:flex;justify-content:center;color:var(--muted)}.pcard.on .pcard-icon{color:var(--blue)}
.pcard-text{min-width:0;overflow:hidden}
.pcard-name{font-size:11.5px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-sub{font-size:9.5px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard.on .pcard-name{color:var(--blue-dark)}.pcard.on .pcard-sub{color:var(--blue)}

/* ── PANTONE PICKER ── */
.ptabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.pfam-btn{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;border:1px solid var(--border);font-size:10px;font-weight:600;cursor:pointer;background:var(--white);color:var(--muted);transition:all .12s;white-space:nowrap}
.pfam-btn:hover{border-color:var(--blue2)}.pfam-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.pfam-dot{width:7px;height:7px;border-radius:50%;border:1px solid rgba(0,0,0,.12);flex-shrink:0}
.p-search-wrap{position:relative;margin-bottom:9px}
.p-search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted)}
.psearch{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:11.5px;outline:none;color:var(--text);background:var(--white);transition:border-color .14s}
.psearch:focus{border-color:var(--blue)}
.pgrid-color{display:flex;flex-wrap:wrap;gap:5px;max-height:140px;overflow-y:auto;margin-bottom:9px;padding:2px;scrollbar-width:thin}
.psw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;position:relative;transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease;flex-shrink:0;will-change:transform;transform:translateZ(0);backface-visibility:hidden}
.psw:hover{transform:translateZ(0) scale(1.08);z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.16)}.psw.on{border-color:#0a3578 !important;transform:translateZ(0) scale(1.04)}
.p-selected{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--blue-bg);border-radius:6px;border:1px solid rgba(21,87,176,.14);margin-bottom:9px;min-height:44px;min-width:0;overflow:hidden}
.p-sel-swatch{width:28px;height:28px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.1);box-shadow:0 1px 4px rgba(0,0,0,.15)}
.p-sel-code{font-size:9.5px;font-weight:700;color:var(--blue);letter-spacing:.4px}
.p-sel-name{font-size:11px;color:var(--text);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.custom-row{display:flex;align-items:center;gap:8px;padding-top:3px}
.custom-lbl{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.custom-row input[type=color]{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);padding:2px;cursor:pointer;background:none;flex-shrink:0}
.hex-input{flex:1;min-width:0;padding:6px 9px;border:1px solid var(--border);border-radius:5px;font-size:11px;font-family:"Lato",monospace;color:var(--text);outline:none}
.hex-input:focus{border-color:var(--blue)}

/* ── MATCH TOGGLE ── */
.match-toggle{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:7px;cursor:pointer;background:var(--white);margin-bottom:10px;transition:all .14s;min-width:0;overflow:hidden}
.match-toggle:hover{border-color:var(--blue)}.match-toggle.on{border-color:var(--blue);background:var(--blue-bg)}
.match-toggle svg{color:var(--muted);flex-shrink:0}.match-toggle.on svg{color:var(--blue)}
.match-text{font-size:11px;font-weight:600;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.match-toggle.on .match-text{color:var(--blue)}
.match-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .14s}
.match-toggle.on .match-check{background:var(--blue);border-color:var(--blue)}

/* ── FINISH GRID ── */
.fin-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px}
.fg{border:1px solid var(--border);border-radius:7px;padding:8px 4px 6px;text-align:center;cursor:pointer;background:var(--white);transition:all .14s;overflow:hidden}
.fg:hover{border-color:var(--blue2)}.fg.on{border-color:var(--blue);background:var(--blue-bg)}
.fg-ball{width:26px;height:26px;border-radius:50%;margin:0 auto 5px;border:1px solid rgba(0,0,0,.1);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.fg-name{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.fg.on .fg-name{color:var(--blue)}

/* ── BARE TOGGLE ── */
.bare-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--blue-bg);border:1px solid rgba(21,87,176,.12);border-radius:7px;margin-bottom:14px;gap:10px}
.bare-lbl{font-size:11px;font-weight:600;color:var(--sub)}.bare-sub{font-size:9px;color:var(--muted);margin-top:1px}
.toggle{position:relative;display:inline-block;width:38px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tgl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#cbd5e1;border-radius:20px;transition:.25s}
.tgl:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input:checked+.tgl{background:var(--blue)}
input:checked+.tgl:before{transform:translateX(18px)}

/* ── UPLOAD ── */
.upload-zone{border:1.5px dashed var(--border);border-radius:7px;padding:18px 14px;text-align:center;cursor:pointer;background:var(--white);position:relative;transition:all .14s;overflow:hidden}
.upload-zone:hover,.upload-zone.has{border-color:var(--blue);background:var(--blue-bg)}
.up-icon-wrap{width:36px;height:36px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 9px;color:var(--blue);border:1px solid rgba(21,87,176,.15)}
.up-txt{font-size:12px;font-weight:600;color:var(--sub)}.up-hint{font-size:9.5px;color:var(--muted);margin-top:2px}
.up-preview{width:100%;max-height:56px;object-fit:contain;border-radius:5px;margin-top:10px;display:none}.up-preview.on{display:block}
.up-clear{position:absolute;top:8px;right:10px;background:#ef4444;border:none;border-radius:4px;color:#fff;padding:2px 8px;font-size:9px;cursor:pointer;display:none;font-family:inherit;font-weight:700}
.upload-zone.has .up-clear{display:block}
.lsliders{border:1px solid var(--border);border-radius:7px;padding:12px;margin-top:8px;display:none;background:var(--white)}.lsliders.on{display:block}
.sl-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}.sl-row:last-child{margin-bottom:0}
.sl-row label{width:52px;font-size:8.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;flex-shrink:0}
.sl-row input[type=range]{flex:1;height:3px;border-radius:3px;background:var(--border);-webkit-appearance:none;cursor:pointer;min-width:0}
.sl-row input[type=range]::-webkit-slider-thumb{width:13px;height:13px;background:var(--blue);border-radius:50%;-webkit-appearance:none;border:2px solid #fff;box-shadow:0 0 0 1px var(--blue)}
.sl-val{width:30px;font-size:9.5px;color:var(--blue);font-weight:700;text-align:right;flex-shrink:0}

/* ── SPEC INFO BOX ── */
.spec-box{background:var(--blue-bg);border:1px solid rgba(21,87,176,.14);border-radius:7px;padding:11px 14px;margin-bottom:12px}
.spec-head{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--blue);margin-bottom:8px}
.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 12px}
.spec-item{}
.spec-key{font-size:9px;color:var(--muted)}
.spec-val{font-size:11px;font-weight:700;color:var(--text)}

/* ── SUMMARY & FORM ── */
.summary{background:var(--blue-bg);border-radius:7px;padding:12px 14px;margin-bottom:18px;border:1px solid rgba(21,87,176,.12)}
.sum-head{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--blue);margin-bottom:8px}
.sum-row{display:flex;justify-content:space-between;align-items:baseline;font-size:11.5px;padding:3.5px 0;border-bottom:1px solid rgba(21,87,176,.07);gap:8px}.sum-row:last-child{border-bottom:none}
.sk{color:var(--muted);flex-shrink:0}.sv{font-weight:700;color:var(--blue-dark);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fc{display:flex;flex-direction:column;gap:4px;min-width:0}.fc.full{grid-column:1/-1}
.flb{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)}
.fi{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:12.5px;color:var(--text);outline:none;transition:border-color .14s;background:var(--white);width:100%}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,87,176,.08)}
.fta{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:12.5px;color:var(--text);outline:none;resize:vertical;min-height:60px;background:var(--white);width:100%}
.fta:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,87,176,.08)}

/* ── BUTTONS ── */
.navrow{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);gap:10px}
.btn-back{padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:var(--white);color:var(--muted);cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;transition:all .14s;white-space:nowrap;flex-shrink:0}
.btn-back:hover{border-color:var(--blue);color:var(--blue)}
.btn-next{padding:8px 20px;border:none;border-radius:6px;background:var(--blue);color:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:5px;transition:background .14s;white-space:nowrap;flex-shrink:0}
.btn-next:hover{background:var(--blue-dark)}
.success-wrap{text-align:center;padding:32px 16px}
.ok-mark{width:56px;height:56px;border-radius:50%;background:var(--blue-bg);border:2px solid var(--blue);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--blue)}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fc{display:flex;flex-direction:column;gap:4px;min-width:0}.fc.full{grid-column:1/-1}

/* ── EXAMPLE TEMPLATES ── */
.tpl-section{margin-bottom:10px}
.tpl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.tpl-card{border:2px solid var(--border);border-radius:7px;overflow:hidden;cursor:pointer;position:relative;transition:all .14s;background:var(--white)}
.tpl-card:hover{border-color:var(--blue2);box-shadow:0 2px 8px rgba(21,87,176,.1)}
.tpl-card.on{border-color:var(--blue)}
.tpl-canvas{width:100%;display:block;aspect-ratio:1.9/1}
.tpl-label{font-size:9px;font-weight:700;color:var(--muted);text-align:center;padding:4px 4px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tpl-card.on .tpl-label{color:var(--blue)}
.tpl-check{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:var(--blue);display:none;align-items:center;justify-content:center}
.tpl-card.on .tpl-check{display:flex}

/* ── MOBILE RESPONSIVE ── */
.viewer-bar,.viewer-strip{display:none}
@media(max-width:768px){
  .viewer-bar{display:flex}
  html,body{height:auto}
  .top-bar{padding:0 14px;height:48px}
  .logo-lt{font-size:19px}
  .logo-contract{font-size:10px;padding-left:43px}
  .hdr-tag{display:none}
  .hdr-sep{display:none}
  .layout{display:block;height:auto;overflow:visible}
  .right{display:none}
  .left{padding:12px 12px 80px;overflow:visible}
  .viewer-strip{display:flex;flex-direction:column;background:radial-gradient(ellipse at 50% 40%,#f8f9fc 0%,#e6eaf2 100%);height:260px;position:relative;border-bottom:1px solid var(--border);cursor:grab}
  .viewer-strip.collapsed{height:0;overflow:hidden}
  .viewer-strip canvas{width:100%!important;height:100%!important}
  .viewer-bar{background:var(--white);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:82px;z-index:97;cursor:pointer}
  .viewer-bar-label{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
  .viewer-bar-chev{transition:transform .25s;color:var(--blue)}
  .viewer-bar-chev.open{transform:rotate(90deg)}
  .step-progress{padding:8px 10px}
  .sp-label{display:none}
  .sp-step{font-size:7px}
  .sp-connector{margin:0 4px;min-width:3px}
  .box{padding:14px 12px}
  .sec-title{font-size:15px;margin-bottom:12px}
  .prod-grid{grid-template-columns:1fr 1fr}
  .fin-grid{grid-template-columns:repeat(5,1fr)}

/* ════════════════════════════════════════════════════════════════
   THREE.JS — 400 ml HOUSEHOLD AIR FRESHENER AEROSOL
   Technical spec (all in metres, 1mm = 0.001m):

   BODY:    R=0.0325m  H=0.195m  (straight wall)
   SHOULDER: H=0.022m  from R=0.0325 → R=0.0135
   NECK:    R=0.0135m  (valve cup: R=0.0137m, H=0.004m)
   CAP:     outerR=0.0335m  H=0.052m  topDome=0.004m
   TOTAL:   0.247m with cap

   Label area: 204.2mm wide (full circumference) × 160mm tall
   Label canvas: 2048 × 1607px (maintains physical ratio)
════════════════════════════════════════════════════════════════ */
const mm = 0.001; // 1mm in Three.js metres

/* Spec values (metres) */
const S3 = {
  bodyR:        31.5 * mm,
  bodyH:        195  * mm,
  shoulderH:    22   * mm,
  neckR:        13.5 * mm,
  valveR:       13.7 * mm,
  valveH:       4    * mm,
  capOuterR:    32.0 * mm,
  capH:         58   * mm,
  capDomeH:     4    * mm,
  actW:         14   * mm,
  actD:         10   * mm,
  actH:         12   * mm,
  totalH:       247  * mm,
};

/* Y positions (bottom of can = 0) */
const Y_body_bot  = 0;
const Y_body_top  = S3.bodyH;
const Y_shld_top  = S3.bodyH + S3.shoulderH;
const Y_valve_top = S3.bodyH + S3.shoulderH + S3.valveH;
/* Cap sits higher on the can so more of the shoulder is visible.
   Bottom now sits 2mm below shoulder start instead of 8mm.
   This gives a lighter, less bulky look while still covering the valve area. */
const Y_cap_bot   = Y_body_top + 0.012;

/* ── RENDERER ── */
const canvas3 = document.getElementById("c3");
const renderer = new THREE.WebGLRenderer({ canvas: canvas3, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.LinearToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xecf0f7);

const camera = new THREE.PerspectiveCamera(28, 1, 0.001, 10);

/* ── STUDIO LIGHTING ── */
scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const keyL = new THREE.DirectionalLight(0xfff9f0, 1.85);
keyL.position.set(-0.3, 0.8, 0.6);
keyL.castShadow = true;
keyL.shadow.mapSize.set(2048, 2048);
keyL.shadow.camera.left = -0.2; keyL.shadow.camera.right = 0.2;
keyL.shadow.camera.top  =  0.4; keyL.shadow.camera.bottom = -0.1;
keyL.shadow.radius = 8; keyL.shadow.bias = -0.0005;
scene.add(keyL);
const fillL = new THREE.DirectionalLight(0xeef4ff, 0.75); fillL.position.set(0.5, 0.2, 0.4);   scene.add(fillL);
const rimL  = new THREE.DirectionalLight(0xffffff, 0.30); rimL.position.set(0,   0.6, -0.7);   scene.add(rimL);
const botL  = new THREE.DirectionalLight(0xf0f5ff, 0.18); botL.position.set(0,  -0.5,  0.3);   scene.add(botL);

/* ── MATERIALS ── */
let bodyMat  = new THREE.MeshStandardMaterial({ color: new THREE.Color(S.bodyColor.hex), roughness: S.finish.r, metalness: S.finish.m });
let labelMat = new THREE.MeshStandardMaterial({ roughness: S.finish.r, metalness: S.finish.m, transparent: true, color: 0xffffff });
let capMat   = new THREE.MeshStandardMaterial({ color: new THREE.Color(S.capMatchBody ? S.bodyColor.hex : S.capColor.hex), roughness: 0.42, metalness: 0.02 });
let ringMat  = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.40, metalness: 0.60 });
let tBodyCol = new THREE.Color(S.bodyColor.hex);
let tCapCol  = new THREE.Color(S.capMatchBody ? S.bodyColor.hex : S.capColor.hex);
let tR = S.finish.r, tM = S.finish.m;

const canGroup = new THREE.Group();
scene.add(canGroup);

/* ── BODY ── straight-wall cylinder, 80% label area */
const bodyMesh = new THREE.Mesh(new THREE.CylinderGeometry(S3.bodyR, S3.bodyR, S3.bodyH, 80, 1), bodyMat);
bodyMesh.position.y = S3.bodyH / 2;
bodyMesh.castShadow = true;
canGroup.add(bodyMesh);

/* ── LABEL ── open-ended cylinder, sits 1mm above body bottom, covers 80% height */
const labelH = S3.bodyH * 0.82;
const labelMesh = new THREE.Mesh(new THREE.CylinderGeometry(S3.bodyR + 0.0002, S3.bodyR + 0.0002, labelH, 80, 1, true), labelMat);
labelMesh.position.y = S3.bodyH * 0.50;
canGroup.add(labelMesh);

/* ── BOTTOM RIM ── metallic seam ring */
const bRim = new THREE.Mesh(new THREE.TorusGeometry(S3.bodyR * 1.005, 1.4 * mm, 8, 72), ringMat);
bRim.rotation.x = Math.PI / 2; bRim.position.y = 3 * mm;
canGroup.add(bRim);

/* ── BOTTOM DOME ── very shallow concave base (standard aerosol) */
const domePts = [];
for (let i = 0; i <= 28; i++) {
  const t = i / 28, a = t * Math.PI * 0.5;
  domePts.push(new THREE.Vector2(S3.bodyR * Math.sin(a), -5 * mm * (1 - Math.cos(a))));
}
const domeMesh = new THREE.Mesh(new THREE.LatheGeometry(domePts, 72), bodyMat);
canGroup.add(domeMesh);

/* ── SHOULDER ── smooth S-curve LatheGeometry from body-R to neck-R */
const shPts = [];
for (let i = 0; i <= 48; i++) {
  const t = i / 48;
  /* ease-in-out cubic for smooth tangent join at both ends */
  const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  const r = S3.bodyR + (S3.neckR - S3.bodyR) * e;
  const y = t * S3.shoulderH;
  shPts.push(new THREE.Vector2(r, y));
}
const shMesh = new THREE.Mesh(new THREE.LatheGeometry(shPts, 72), bodyMat);
shMesh.position.y = Y_body_top;
shMesh.castShadow = true;
canGroup.add(shMesh);

/* ── VALVE CUP ── small metallic cylinder at top of shoulder */
const valveMesh = new THREE.Mesh(new THREE.CylinderGeometry(S3.valveR, S3.valveR, S3.valveH, 48), ringMat);
valveMesh.position.y = Y_shld_top + S3.valveH / 2;
canGroup.add(valveMesh);

/* ── CAP ────────────────────────────────────────────────────────
   Standard fixed overcap with an angled top profile.
   This is not a lathed shape. It is built from a cylinder and then
   deformed so the top stays high at the back and falls smoothly toward
   the front, matching the reference cap style the user shared.
──────────────────────────────────────────────────────────────── */
const capGroup = new THREE.Group();
capGroup.position.y = Y_cap_bot;
canGroup.add(capGroup);

function makeAngledCapGeometry(outerRadius, height, radialSegments = 96, heightSegments = 30) {
  const g = new THREE.CylinderGeometry(outerRadius, outerRadius * 1.01, height, radialSegments, heightSegments, false);
  const pos = g.attributes.position;
  const halfH = height / 2;
  const backStartZ = -outerRadius * 0.58;   // back section stays flatter for longer
  const frontEndZ  =  outerRadius * 0.92;   // front edge reaches the lowest top point
  const maxDrop    =  height * 0.14;        // gentler front drop so the top stays covered
  const softenBand =  11 * mm;               // softer moulded rounding at the top edge

  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    let y = pos.getY(i);
    const z = pos.getZ(i);

    const t = THREE.MathUtils.clamp((z - backStartZ) / (frontEndZ - backStartZ), 0, 1);
    const slope = Math.pow(t, 1.75);
    const topLimit = halfH - maxDrop * slope;

    if (y > topLimit) {
      const above = y - topLimit;
      const compression = Math.max(0, 1 - above / softenBand);
      y = topLimit + above * compression * 0.18;
    }

    // Gentle side softening so the silhouette feels more injection-moulded
    const sideFactor = Math.abs(x) / outerRadius;
    if (y > halfH - 14 * mm) {
      y -= sideFactor * sideFactor * 0.5 * mm;
    }

    pos.setY(i, y);
  }

  g.computeVertexNormals();
  return g;
}

const capOuterGeom = makeAngledCapGeometry(S3.capOuterR, S3.capH);
const capShellM = new THREE.Mesh(capOuterGeom, capMat);
capShellM.castShadow = true;
capGroup.add(capShellM);

const capInnerGeom = makeAngledCapGeometry(S3.capOuterR - 1.0 * mm, S3.capH - 2.5 * mm, 96, 28);
const capInnerM = new THREE.Mesh(capInnerGeom, capMat);
capInnerM.scale.set(0.992, 0.96, 0.992);
capInnerM.position.y = 1.2 * mm;
capGroup.add(capInnerM);

const capLipM = new THREE.Mesh(new THREE.TorusGeometry(S3.capOuterR * 1.002, 0.7 * mm, 8, 96), ringMat);
capLipM.rotation.x = Math.PI / 2;
capLipM.position.y = 1.8 * mm;
capGroup.add(capLipM);

/* D. Actuator button (14×10×12mm box, sits on valve, centred) */
const actMat2 = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.55, metalness: 0.05 });
const actMesh = new THREE.Mesh(
  new THREE.BoxGeometry(S3.actW, S3.actH, S3.actD),
  actMat2
);
actMesh.position.y = Y_shld_top + S3.valveH + S3.actH / 2 - 2 * mm;
actMesh.rotation.y = 0; /* faces front */
canGroup.add(actMesh);

/* ── POSITION WHOLE CAN ── origin at base, centred in view */
canGroup.position.y = -(S3.totalH / 2);

/* ── CAMERA ── proportioned for 247mm tall model */
function updateCamera() {
  const s = S.size.scale * ((S.prod.sx + S.prod.sy) / 2);
  const h = S3.totalH * s;
  const fovRad = (28 * Math.PI) / 180;
  const dist = (h / 2) / Math.tan(fovRad / 2) * 1.35;
  camera.position.set(0, 0, dist);
  camera.lookAt(0, h * 0.03, 0);
  camera.updateProjectionMatrix();
}

/* ── LABEL TEXTURE ──────────────────────────────────────────────
   Physical label spec: 204.2mm wide × 160mm tall (safe zone)
   Canvas represents full 360° wrap:
     Circumference = π × 65mm = 204.2mm
     Label height (safe) = 160mm

   Canvas size: 2048 × 1607px  (ratio = 204.2:160 = 1.276:1)
   texture.offset.x = 0.5  → canvas centre = front face (U=0)
   texture.wrapS = RepeatWrapping → seamless at seam
──────────────────────────────────────────────────────────────── */
const LABEL_W = 2048, LABEL_H = 1607; /* matches 204.2 × 160mm ratio */
let labelTex = null;

function generateLabel() {
  const W = LABEL_W, H = LABEL_H;
  const cv = document.createElement("canvas"); cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");

  /* Base coat */
  ctx.fillStyle = S.bodyColor.hex; ctx.fillRect(0, 0, W, H);

  /* Metallic shimmer for metallic/chrome finishes */
  if (S.finish.id === "metallic" || S.finish.id === "chrome") {
    const g = ctx.createLinearGradient(0, 0, W, 0);
    g.addColorStop(0,    "rgba(0,0,0,0.22)");
    g.addColorStop(0.15, "rgba(255,255,255,0.10)");
    g.addColorStop(0.40, "rgba(255,255,255,0.26)");
    g.addColorStop(0.60, "rgba(255,255,255,0.12)");
    g.addColorStop(0.85, "rgba(0,0,0,0.06)");
    g.addColorStop(1,    "rgba(0,0,0,0.22)");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }

  /* User artwork centred on canvas → front face */
  if (S.designImg && !S.bareMode) {
    const img = S.designImg;
    const dw = W * S.labelScale;
    const dh = (dw / img.width) * img.height;
    ctx.drawImage(img, W/2 - dw/2, H * S.labelPosY - dh/2, dw, dh);
  }

  if (labelTex) labelTex.dispose();
  labelTex = new THREE.CanvasTexture(cv);
  labelTex.encoding   = THREE.sRGBEncoding;
  labelTex.wrapS      = THREE.RepeatWrapping;
  labelTex.offset.x   = 0.5; /* front-face centre */

  labelMat.map      = labelTex;
  labelMat.color.set(0xffffff);
  labelMat.roughness  = S.finish.r;
  labelMat.metalness  = S.finish.m;
  labelMat.needsUpdate = true;
}

/* ── COLOUR + FINISH UPDATE ── */
function applyColors() {
  tBodyCol.set(S.bodyColor.hex);
  tCapCol.set(S.capMatchBody ? S.bodyColor.hex : S.capColor.hex);
  tR = S.finish.r; tM = S.finish.m;
  generateLabel();
  updateBadge();
}

/* ── ROTATION ──────────────────────────────────────────────────
   autoSpin   = accumulated Y rotation (degrees equiv, in radians)
   When drag starts: freeze autoSpin at current canGroup.rotation.y
   While dragging:   directly set canGroup.rotation.y = autoSpin + delta
   When drag ends:   persist new rotation back into autoSpin
─────────────────────────────────────────────────────────────── */
let autoSpin = 0, isDrag = false, lastX = 0;

function startDrag(x) {
  isDrag  = true;
  lastX   = x;
  autoSpin = canGroup.rotation.y; /* freeze at current position */
}
function moveDrag(x) {
  if (!isDrag) return;
  autoSpin += (x - lastX) * 0.012;
  lastX = x;
  canGroup.rotation.y = autoSpin;
}
function endDrag() {
  isDrag = false;
}

canvas3.addEventListener("mousedown",  e => { startDrag(e.clientX); e.preventDefault(); });
window.addEventListener("mousemove",   e => { moveDrag(e.clientX); });
window.addEventListener("mouseup",     ()=> { endDrag(); });
canvas3.addEventListener("touchstart", e => { startDrag(e.touches[0].clientX); e.preventDefault(); }, {passive:false});
canvas3.addEventListener("touchmove",  e => { moveDrag(e.touches[0].clientX);  e.preventDefault(); }, {passive:false});
canvas3.addEventListener("touchend",   ()=> { endDrag(); });

/* ── ANIMATE ── */
function animate() {
  requestAnimationFrame(animate);
  if (!isDrag) {
    autoSpin += 0.004;
    canGroup.rotation.y = autoSpin;
  }
  bodyMat.color.lerp(tBodyCol, 0.08);
  bodyMat.roughness += (tR - bodyMat.roughness) * 0.08;
  bodyMat.metalness += (tM - bodyMat.metalness) * 0.08;
  capMat.color.lerp(tCapCol, 0.08);
  labelMat.roughness += (tR - labelMat.roughness) * 0.08;
  labelMat.metalness += (tM - labelMat.metalness) * 0.08;
  renderer.render(scene, camera);
}

/* ── RESIZE ── */
function isMobile() { return window.innerWidth <= 768; }

function resizeMobile() {
  const strip = document.getElementById("vstrip");
  if (!strip || strip.classList.contains("collapsed")) return;
  const W = strip.clientWidth || window.innerWidth;
  const H = strip.clientHeight || 260;
  if (W < 1 || H < 1) return;
  renderer.setSize(W, H);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  updateCamera();
}

function resize() {
  if (isMobile()) { resizeMobile(); return; }
  const r = document.querySelector(".right");
  const W = r.clientWidth, H = r.clientHeight;
  if (W < 1 || H < 1) return;
  renderer.setSize(W, H);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  updateCamera();
}
window.addEventListener("resize", ()=>{
  if (isMobile()) { resizeMobile(); } else { resize(); }
});

        <select class="fi"><option>1 000 – 5 000 units</option><option>5 000 – 10 000 units</option><option>10 000 – 50 000 units</option><option>50 000+ units</option></select></div>
      <div class="fc"><div class="flb">Lead Time Required</div>
        <select class="fi"><option>Standard — 8 to 12 weeks</option><option>Express — 4 to 6 weeks</option><option>No fixed deadline</option></select></div>
    </div>
    <div class="form-grid"><div class="fc full"><div class="flb">Additional Notes</div>
      <textarea class="fta" placeholder="Special requirements, certifications, or questions…"></textarea></div></div>
    <div class="navrow">
      <button class="btn-back" onclick="ps()">Back</button>
      <button class="btn-next" onclick="submitForm()">Submit Request ${IC.chevron}</button>
    </div>`;
}

/* ════════════════════════════════════════════
   ACTIONS
════════════════════════════════════════════ */
function rebox(){
  renderNav();
  const b=document.getElementById("sbox");
  if(S.step===1) b.innerHTML=rStep1();
  else if(S.step===2) b.innerHTML=rStep2();
  else if(S.step===3) b.innerHTML=rStep3();
  else if(S.step===4) b.innerHTML=rStep4();
  else if(S.step===5) b.innerHTML=rStep5();
}
function ns(){if(S.step<5){S.step++;rebox();}}
function ps(){if(S.step>1){S.step--;rebox();}}
function goStep(n){S.step=n;rebox();}

function pickColor(prop,code){
  const c=PANTONE.find(x=>x.code===code); if(!c)return;
  S[prop]=c;
  if(prop==="bodyColor"){tBodyCol.set(c.hex);generateLabel();updateBadge();}
  if(prop==="capColor"){tCapCol.set(c.hex);}
  rebox();
}
function pickHex(prop,hex){
  if(!/^#[0-9a-fA-F]{6}$/.test(hex))return;
  S[prop]={code:"Custom",name:"Custom colour",hex,f:"N"};
  if(prop==="bodyColor"){tBodyCol.set(hex);generateLabel();updateBadge();}
  if(prop==="capColor"){tCapCol.set(hex);}
  rebox();
}
function onUpload(e){
  const f=e.target.files[0]; if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{const img=new Image(); img.onload=()=>{S.designImg=img;generateLabel();rebox();}; img.src=ev.target.result;};
  reader.readAsDataURL(f);
}
function clearDesign(e){
  e.stopPropagation(); S.designImg=null; S.selectedTemplate=null;
  const fup=document.getElementById("fup"); if(fup)fup.value="";
  generateLabel(); rebox();
}
function submitForm(){
  document.getElementById("sbox").innerHTML=`<div class="success-wrap">
    <div class="ok-mark"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div style="font-size:21px;font-weight:300;color:var(--blue-dark);margin-bottom:10px">Request Submitted</div>
    <div style="font-size:13px;color:var(--muted);line-height:1.7;max-width:320px;margin:0 auto">Your packaging specification has been received.<br>A member of the Aerostar team will respond within one business day.</div>
    <button class="btn-next" style="margin:24px auto 0;display:inline-flex" onclick="resetAll()">New Configuration ${IC.chevron}</button>
  </div>`;
}
function resetAll(){
  S={step:1,category:"beauty",prod:PRODUCTS.beauty[0],size:SIZES[2],
    bodyColor:PANTONE.find(p=>p.code==="877 C"),capMatchBody:false,
    capColor:PANTONE.find(p=>p.code==="Black C"),
    finish:FINISHES[1],designImg:null,labelPosY:0.48,labelScale:0.82,bareMode:false,
    pfam:"All",psearch:"",selectedTemplate:null};
  tBodyCol.set(S.bodyColor.hex); tCapCol.set(S.capColor.hex);
  tR=S.finish.r; tM=S.finish.m;
  updateCamera(); generateLabel(); updateBadge(); rebox();
}




/* ── INIT ── */
initMobile();
resize();
updateCamera();
generateLabel();
applyColors();
animate();
rebox();
</script>
